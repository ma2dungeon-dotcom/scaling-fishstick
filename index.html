    border: 2px solid transparent;
}

    border: 2px solid; text-shadow: 0 0 10px currentColor;

#start-btn {
    position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%);
    background: linear-gradient(135deg, #e94560, #c23152);
    color: white; border: none; padding: 15px 50px; font-size: 22px;
    border-radius: 30px; cursor: pointer; font-weight: bold;
    box-shadow: 0 4px 20px rgba(233,69,96,0.5);
    transition: 0.3s; display: none;
}
#start-btn:hover { transform: translateX(-50%) scale(1.05); box-shadow: 0 6px 30px rgba(233,69,96,0.7); }
#game-hud {
    position: absolute; bottom: 10px; left: 50%; transform: translateX(-50%);

    color: white; font-size: 14px; display: none;
    border: 1px solid rgba(255,255,255,0.2);

#round-result {
    position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%);

    color: white; text-align: center; display: none;
    border: 3px solid; z-index: 100;

#round-result h1 { font-size: 42px; margin-bottom: 10px; }
#round-result p { font-size: 16px; color: #ccc; margin: 5px 0; }
#round-result button {
    margin-top: 20px; background: #e94560; color: white; border: none;
    padding: 12px 40px; font-size: 18px; border-radius: 25px; cursor: pointer;
    transition: 0.2s;
}
#round-result button:hover { background: #c23152; }
#instructions {
    position: absolute; bottom: 60px; left: 50%; transform: translateX(-50%);
    background: rgba(0,0,0,0.8); border-radius: 10px; padding: 10px 20px;
    color: #ddd; font-size: 14px; display: none; text-align: center;
    border: 1px solid rgba(255,255,255,0.1);
}
#kill-cooldown {
    position: absolute; bottom: 50px; right: 20px;
    background: rgba(0,0,0,0.85); border-radius: 10px; padding: 10px 15px;
    color: white; font-size: 14px; display: none;

#alive-count {
    position: absolute; top: 10px; left: 10px;

    color: white; font-size: 14px; display: none;
    border: 1px solid rgba(255,255,255,0.2);
}
#loading {
    position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%);
    color: white; font-size: 18px; background: rgba(0,0,0,0.8);
    padding: 20px 40px; border-radius: 15px; display: none;

#db-status {
    position: absolute; bottom: 10px; right: 10px;
    font-size: 11px; color: #888; background: rgba(0,0,0,0.6);
    padding: 5px 10px; border-radius: 5px;

#leaderboard {
    position: absolute; top: 10px; left: 10px;

// ============ KEYBOARD INPUT (FIXED) ============
function handleKeyDown(e) {
    const key = e.key.toLowerCase();
    keys[key] = true;
    // Prevent scrolling with arrow keys/space
    if (['w','a','s','d','ц','ф','ы','в',' ','arrowup','arrowdown','arrowleft','arrowright'].includes(key)) {
        e.preventDefault();
    }
}
function handleKeyUp(e) {
    keys[e.key.toLowerCase()] = false;
}

window.addEventListener('keydown', handleKeyDown, { passive: false });
window.addEventListener('keyup', handleKeyUp);
canvas.addEventListener('keydown', handleKeyDown, { passive: false });
canvas.addEventListener('keyup', handleKeyUp);

// Mouse input
window.addEventListener('mousemove', e => {
    mouse.x = e.clientX;
    mouse.y = e.clientY;
    mouse.worldX = mouse.x - canvas.width / 2 + camera.x;
    mouse.worldY = mouse.y - canvas.height / 2 + camera.y;
});
window.addEventListener('mousedown', e => {
    mouse.clicked = true;
    if (gameState === 'playing' && player.alive) {
        if (player.role === 'murder' && player.killCooldown <= 0) tryMurderKill();
        else if (player.role === 'sheriff' && player.shootingCooldown <= 0) trySheriffShoot();
    }
});
window.addEventListener('mouseup', () => mouse.clicked = false);

// ============ SKIN PANEL ============
function buildSkinPanel() {
    const list = document.getElementById('skin-list');
    list.innerHTML = '';
    SKINS.forEach(skin => {
        const div = document.createElement('div');
        div.className = 'skin-option' + (skin.id === selectedSkin ? ' selected' : '');
        div.innerHTML = `
            <div class="skin-preview" style="background:${skin.bg}">${skin.tip}</div>
            <div>
                <div style="font-weight:bold; color:${skin.color}">${skin.name}</div>
                <div style="font-size:11px; color:#aaa;">${skin.desc}</div>
            </div>
        `;
        div.onclick = () => {
            selectedSkin = skin.id;
            localStorage.setItem('mm2_selected_skin', selectedSkin);
            buildSkinPanel();
        };
        list.appendChild(div);
    });
}

// ============ FIREBASE FUNCTIONS ============
function loadPlayerData() {
    if (!dbConnected || !db) return;
    document.getElementById('loading').style.display = 'block';
    
    db.ref('players/' + playerId).once('value').then(snap => {
        const data = snap.val();
        if (data) {
            if (data.selectedSkin) selectedSkin = data.selectedSkin;
            if (data.stats) playerStats = { ...playerStats, ...data.stats };
        }
        buildSkinPanel();
    }).catch(console.error).finally(() => {
        document.getElementById('loading').style.display = 'none';
    });
}

function savePlayerData() {
    if (!dbConnected || !db) return;
    db.ref('players/' + playerId).update({
        selectedSkin: selectedSkin,
        stats: playerStats,
        lastSeen: firebase.database.ServerValue.TIMESTAMP
    }).catch(console.error);
}

function loadLeaderboard() {
    if (!dbConnected || !db) {
        document.getElementById('leaderboard').style.display = 'none';
        return;
    }
    document.getElementById('leaderboard').style.display = 'block';
    
    db.ref('leaderboard').orderByChild('wins').limitToLast(10).once('value')
        .then(snap => {
            const lb = document.getElementById('lb-list');
            lb.innerHTML = '';
            const entries = [];
            snap.forEach(child => entries.push({ id: child.key, ...child.val() }));
            entries.reverse().forEach((entry, i) => {
                const div = document.createElement('div');
                div.className = 'lb-entry';
                div.innerHTML = `<span class="rank">#${i+1}</span> ${entry.name || entry.id.substr(0,8)} <span class="wins">🏆${entry.stats?.wins||0}</span> <span class="losses">💀${entry.stats?.losses||0}</span>`;
                lb.appendChild(div);
            });
            if (entries.length === 0) lb.innerHTML = '<div style="color:#888;text-align:center;padding:10px;">Нет данных</div>';
        }).catch(console.error);
}

function updateLeaderboard(result) {
    if (!dbConnected || !db) return;
    
    playerStats.games++;
    if (result.includes('win')) playerStats.wins++;
    else playerStats.losses++;
    localStorage.setItem('mm2_stats', JSON.stringify(playerStats));
    
    // Update local
    db.ref('players/' + playerId).update({
        stats: playerStats,
        name: playerStats.name || playerId.substr(0, 10)
    });
    
    // Update leaderboard entry
    db.ref('leaderboard/' + playerId).update({
        stats: playerStats,
        name: playerId.substr(0, 10),
        lastUpdate: firebase.database.ServerValue.TIMESTAMP
    });
    
    loadLeaderboard();
}

document.getElementById('save-skin-btn').onclick = () => {
    if (dbConnected) {
        savePlayerData();
        alert('✅ Скин сохранён в базе данных!');
    } else {
        alert('⚠️ База данных не подключена. Скин сохранён локально.');
    }
};

// ============ INIT ============
function initLobby() {
    gameState = 'lobby';
    player.x = LOBBY_MAP.spawnX;
    player.y = LOBBY_MAP.spawnY;
    player.alive = true;
    player.role = 'innocent';
    player.killCooldown = 0;
    player.shootingCooldown = 0;
    bots = [];
    
    for (let i = 0; i < 6; i++) bots.push(createBot('lobby'));
    
    document.getElementById('skin-panel').style.display = 'block';
    document.getElementById('start-btn').style.display = 'block';
    document.getElementById('role-display').style.display = 'none';
    document.getElementById('game-hud').style.display = 'none';
    document.getElementById('round-result').style.display = 'none';
    document.getElementById('instructions').style.display = 'block';
    document.getElementById('instructions').innerHTML = '🎮 <b>WASD</b> или <b>стрелки</b> — движение | <b>Мышь</b> — камера | Выбери скин 🔪';
    document.getElementById('kill-cooldown').style.display = 'none';
    document.getElementById('alive-count').style.display = 'none';
    document.getElementById('leaderboard').style.display = dbConnected ? 'block' : 'none';
    
    buildSkinPanel();
    canvas.focus();
}

function createBot(map) {
    const names = ['Alex','Max','Luna','Storm','Blaze','Nova','Shadow','Echo','Raven','Pixel','Zara','Kai','Neo','Ava','Leo'];
    const colors = ['#44aaff','#ff6644','#44ff88','#ff44cc','#ffcc44','#8844ff','#44ffcc','#ff8844','#cc44ff','#44ccff','#ff4488','#44ffaa','#aa44ff','#ffaa44','#88ff44'];
    const idx = Math.floor(Math.random() * names.length);
    
    if (map === 'lobby') {
        return {
            x: 200 + Math.random() * 500, y: 200 + Math.random() * 300,
            speed: 1 + Math.random() * 1.5, size: 16,
            name: names[idx], color: colors[idx], role: 'innocent',
            alive: true, targetX: 0, targetY: 0, moveTimer: 0,
            isBot: true, killCooldown: 0, shootingCooldown: 0,
        };
    }
    return {
        x: GAME_MAP.spawnX + (Math.random() - 0.5) * 600,
        y: GAME_MAP.spawnY + (Math.random() - 0.5) * 400,
        speed: 2 + Math.random() * 1, size: 16,
        name: names[idx], color: colors[idx], role: 'innocent',
        alive: true, targetX: 0, targetY: 0, moveTimer: 0,
        isBot: true, killCooldown: 0, shootingCooldown: 0,
    };
}

// ============ START GAME ============
function startGame() {
    gameState = 'countdown';
    countdownTimer = 3;
    document.getElementById('skin-panel').style.display = 'none';
    document.getElementById('start-btn').style.display = 'none';
    document.getElementById('instructions').style.display = 'none';
    document.getElementById('leaderboard').style.display = 'none';

    player.x = GAME_MAP.spawnX;
    player.y = GAME_MAP.spawnY;
    player.alive = true;

    bots = [];
    for (let i = 0; i < 9; i++) bots.push(createBot('game'));

    const allPlayers = [player, ...bots];
    const murderIdx = Math.floor(Math.random() * allPlayers.length);
    let sheriffIdx;
    do { sheriffIdx = Math.floor(Math.random() * allPlayers.length); } while (sheriffIdx === murderIdx);

    allPlayers.forEach((p, i) => {
        p.role = (i === murderIdx) ? 'murder' : (i === sheriffIdx) ? 'sheriff' : 'innocent';
        p.alive = true;
        p.killCooldown = 0;
        p.shootingCooldown = 0;
    });

    const roleDisplay = document.getElementById('role-display');
    roleDisplay.style.display = 'block';
    if (player.role === 'murder') {
        roleDisplay.textContent = '🗡️ MURDER — Убей всех!';
        roleDisplay.style.borderColor = '#ff0044';
        roleDisplay.style.color = '#ff0044';
    } else if (player.role === 'sheriff') {
        roleDisplay.textContent = '🔫 SHERIFF — Найди убийцу!';
        roleDisplay.style.borderColor = '#44aaff';
        roleDisplay.style.color = '#44aaff';
    } else {
        roleDisplay.textContent = '😰 INNOCENT — Выживи!';
        roleDisplay.style.borderColor = '#44ff88';
        roleDisplay.style.color = '#44ff88';
    }

    setTimeout(() => {
        if (gameState !== 'countdown') return;
        gameState = 'playing';
        roundTimer = 0;
        document.getElementById('instructions').style.display = 'block';
        
        if (player.role === 'murder') {
            document.getElementById('instructions').innerHTML = '<b>WASD</b> — движение | <b>ЛКМ</b> рядом с игроком — убить | Кулдаун: 1с';
            document.getElementById('kill-cooldown').style.display = 'block';
        } else if (player.role === 'sheriff') {
            document.getElementById('instructions').innerHTML = '<b>WASD</b> — движение | <b>ЛКМ</b> — стрелять | ⚠️ Убьёшь невиновного = проигрыш!';
            document.getElementById('kill-cooldown').style.display = 'block';
        } else {
            document.getElementById('instructions').innerHTML = '<b>WASD</b> — движение | Беги и прячься! 🏃';
            document.getElementById('kill-cooldown').style.display = 'none';
        }
        document.getElementById('alive-count').style.display = 'block';
        canvas.focus();
    }, 3500);
}

// ============ COMBAT ============
function tryMurderKill() {
    const allPlayers = [player, ...bots];
    for (let p of allPlayers) {
        if (p === player || !p.alive) continue;
        const dist = Math.hypot(p.x - player.x, p.y - player.y);
        if (dist < 70) {
            killPlayer(p);
            player.killCooldown = 60;
            player.kills = (player.kills || 0) + 1;
            spawnParticles(p.x, p.y, '#ff0044', 15);
            return;
        }
    }
}

function trySheriffShoot() {
    const allPlayers = [player, ...bots];
    for (let p of allPlayers) {
        if (p === player || !p.alive) continue;
        const dist = Math.hypot(p.x - player.x, p.y - player.y);
        if (dist < 180) {
            if (p.role === 'murder') {
                killPlayer(p);
                spawnParticles(p.x, p.y, '#44aaff', 20);
                endRound('sheriff_win', 'Вы нашли убийцу! 🎉');
            } else {
                killPlayer(player);
                spawnParticles(player.x, player.y, '#ff0044', 15);
                endRound('murder_win', 'Вы убили невиновного! 💀');
            }
            player.shootingCooldown = 90;
            return;
        }
    }
    player.shootingCooldown = 40;
    spawnParticles(mouse.worldX, mouse.worldY, '#ffcc00', 5);
}

function killPlayer(p) {
    p.alive = false;
    for (let i = 0; i < 10; i++) {
        particles.push({
            x: p.x, y: p.y,
            vx: (Math.random() - 0.5) * 6, vy: (Math.random() - 0.5) * 6,
            life: 30 + Math.random() * 20, maxLife: 50,
            color: p.color, size: 3 + Math.random() * 4,
        });
    }
}

function spawnParticles(x, y, color, count) {
    for (let i = 0; i < count; i++) {
        particles.push({
            x, y,
            vx: (Math.random() - 0.5) * 8, vy: (Math.random() - 0.5) * 8,
            life: 20 + Math.random() * 30, maxLife: 50,
            color, size: 2 + Math.random() * 5,
        });
    }
}

function endRound(result, text) {
    gameState = 'ended';
    const el = document.getElementById('round-result');
    el.style.display = 'block';
    
    const isWin = result.includes('win');
    document.getElementById('result-title').textContent = isWin ? '🏆 ПОБЕДА!' : '💀 ПРОИГРЫШ';
    document.getElementById('result-title').style.color = isWin ? '#44ff88' : '#ff4444';
    document.getElementById('result-text').textContent = text;
    document.getElementById('result-stats').textContent = `Побед: ${playerStats.wins} | Поражений: ${playerStats.losses}`;
    el.style.borderColor = isWin ? '#44ff88' : '#ff4444';
    
    document.getElementById('instructions').style.display = 'none';
    document.getElementById('kill-cooldown').style.display = 'none';
    document.getElementById('role-display').style.display = 'none';
    document.getElementById('alive-count').style.display = 'none';
    
    updateLeaderboard(result);
    savePlayerData();
}

function backToLobby() {
    document.getElementById('round-result').style.display = 'none';
    initLobby();
}

// ============ COLLISION ============
function collidesWithWall(x, y, size, map) {
    for (let w of map.walls) {
        if (x + size > w.x && x - size < w.x + w.w &&
            y + size > w.y && y - size < w.y + w.h) {
            return true;
        }
    }
    return false;
}

// ============ BOT AI ============
function updateBots(map) {
    bots.forEach(bot => {
        if (!bot.alive) return;
        bot.moveTimer--;
        if (bot.moveTimer <= 0) {
            bot.targetX = 100 + Math.random() * (map.width - 200);
            bot.targetY = 100 + Math.random() * (map.height - 200);
            bot.moveTimer = 120 + Math.random() * 180;
        }

        // Murder bot
        if (bot.role === 'murder' && bot.killCooldown <= 0) {
            let nearest = null, nearestDist = Infinity;
            for (let p of [player, ...bots]) {
                if (p === bot || !p.alive) continue;
                const d = Math.hypot(p.x - bot.x, p.y - bot.y);
                if (d < nearestDist) { nearestDist = d; nearest = p; }
            }
            if (nearest && nearestDist < 50) {
                killPlayer(nearest);
                bot.killCooldown = 90;
                spawnParticles(nearest.x, nearest.y, '#ff0044', 15);
                return;
            }
            if (nearest && nearestDist < 300) {
                const dx = nearest.x - bot.x, dy = nearest.y - bot.y;
                const dist = Math.hypot(dx, dy);
                const nx = dx / dist * bot.speed, ny = dy / dist * bot.speed;
                if (!collidesWithWall(bot.x + nx, bot.y, bot.size, map)) bot.x += nx;
                if (!collidesWithWall(bot.x, bot.y + ny, bot.size, map)) bot.y += ny;
                return;
            }
        }

        // Sheriff bot
        if (bot.role === 'sheriff' && bot.shootingCooldown <= 0) {
            let murder = null, murderDist = Infinity;
            for (let p of [player, ...bots]) {
                if (p === bot || !p.alive || p.role !== 'murder') continue;
                const d = Math.hypot(p.x - bot.x, p.y - bot.y);
                if (d < murderDist) { murderDist = d; murder = p; }
            }
            if (murder && murderDist < 200 && Math.random() < 0.25) {
                killPlayer(murder);
                spawnParticles(murder.x, murder.y, '#44aaff', 20);
                if (murder === player && player.role === 'murder') {
                    endRound('sheriff_win', 'Шериф нашёл убийцу!');
                }
                bot.shootingCooldown = 90;
                return;
            }
        }

        // Move
        const dx = bot.targetX - bot.x, dy = bot.targetY - bot.y;
        const dist = Math.hypot(dx, dy);
        if (dist > 10) {
            const nx = (dx / dist) * bot.speed, ny = (dy / dist) * bot.speed;
            if (!collidesWithWall(bot.x + nx, bot.y, bot.size, map)) bot.x += nx;
            if (!collidesWithWall(bot.x, bot.y + ny, bot.size, map)) bot.y += ny;
        }
        if (bot.killCooldown > 0) bot.killCooldown--;
        if (bot.shootingCooldown > 0) bot.shootingCooldown--;
    });
}

// ============ UPDATE ============
function update() {
    if (gameState === 'countdown') {
        countdownTimer -= 1/60;
        return;
    }
    if (gameState !== 'playing') return;

    // FIXED: Player movement with proper key handling
    let dx = 0, dy = 0;
    if (keys['w'] || keys['ц'] || keys['arrowup'] || keys['стрелкавверх']) dy = -1;
    if (keys['s'] || keys['ы'] || keys['arrowdown'] || keys['стрелкавниз']) dy = 1;
    if (keys['a'] || keys['ф'] || keys['arrowleft'] || keys['стрелкавлево']) dx = -1;
    if (keys['d'] || keys['в'] || keys['arrowright'] || keys['стрелкавправо']) dx = 1;

    if (dx !== 0 && dy !== 0) { dx *= 0.707; dy *= 0.707; }

    const currentMap = gameState === 'lobby' ? LOBBY_MAP : GAME_MAP;

    if (player.alive) {
        const newX = player.x + dx * player.speed;
        const newY = player.y + dy * player.speed;
        if (!collidesWithWall(newX, player.y, player.size, currentMap)) player.x = newX;
        if (!collidesWithWall(player.x, newY, player.size, currentMap)) player.y = newY;
        if (player.killCooldown > 0) player.killCooldown--;
        if (player.shootingCooldown > 0) player.shootingCooldown--;
    }

    // Camera follow
    camera.x += (player.x - camera.x) * 0.08;
    camera.y += (player.y - camera.y) * 0.08;

    updateBots(currentMap);

    // Particles
    particles = particles.filter(p => {
        p.x += p.vx; p.y += p.vy;
        p.vx *= 0.95; p.vy *= 0.95;
        p.life--;
        return p.life > 0;
    });

    // Win conditions
    if (gameState === 'playing') {
        const all = [player, ...bots];
        const alive = all.filter(p => p.alive);
        const murders = alive.filter(p => p.role === 'murder');
        const sheriffs = alive.filter(p => p.role === 'sheriff');
        const innocents = alive.filter(p => p.role === 'innocent');

        if (murders.length === 0) {
            endRound(player.role === 'murder' ? 'sheriff_win' : 'innocent_win', 
                player.role === 'murder' ? 'Убийца eliminated! 💀' : 'Убийца найден! 🎉');
        } else if (player.role === 'murder' && innocents.length === 0 && sheriffs.length === 0) {
            endRound('murder_win', 'Вы убили всех! 🗡️');
        } else if (!player.alive && player.role !== 'murder') {
            endRound('murder_win', 'Вас убил убийца! 💀');
        } else if (alive.length === murders.length && murders.length > 0) {
            endRound('murder_win', 'Убийца победил! 🗡️');
        }

        roundTimer++;
    }

    // HUD updates
    if (gameState === 'playing') {
        const all = [player, ...bots];
        const alive = all.filter(p => p.alive).length;
        document.getElementById('alive-count').innerHTML = `👥 Живых: ${alive}/${all.length}`;
        
        if (player.role === 'murder') {
            const cd = Math.max(0, player.killCooldown / 60).toFixed(1);
            document.getElementById('kill-cooldown').innerHTML = `🗡️ Готов через: ${cd}с`;
        } else if (player.role === 'sheriff') {
            const cd = Math.max(0, player.shootingCooldown / 60).toFixed(1);
            document.getElementById('kill-cooldown').innerHTML = `🔫 Готов через: ${cd}с`;
        }
    }
}

// ============ DRAW ============
function drawKnife(x, y, skinId, angle) {
    const skin = SKINS.find(s => s.id === skinId) || SKINS[0];
    ctx.save();
    ctx.translate(x, y);
    ctx.rotate(angle);
    
    // Blade
    ctx.fillStyle = skin.color;
    ctx.beginPath();
    ctx.moveTo(0, -12); ctx.lineTo(4, -2); ctx.lineTo(4, 2);
    ctx.lineTo(0, 4); ctx.lineTo(-4, 2); ctx.lineTo(-4, -2); ctx.closePath();
    ctx.fill();
    
    // Handle
    ctx.fillStyle = '#8B4513';
    ctx.fillRect(-3, 4, 6, 8);
    ctx.fillStyle = '#666';
    ctx.fillRect(-5, 3, 10, 2);
    
    // Special effects
    if (['flame','ice','galaxy','gold','blood','rainbow','shadow'].includes(skinId)) {
        ctx.globalAlpha = 0.4;
        const colors = { flame: '#ff6600', ice: '#88ddff', galaxy: '#aa44ff', gold: '#ffdd44', blood: '#ff0000', rainbow: `hsl(${Date.now()/20%360},100%,50%)`, shadow: '#000' };
        ctx.fillStyle = colors[skinId] || skin.color;
        ctx.beginPath(); ctx.arc(0, -8, skinId === 'galaxy' ? 12 : 8, 0, Math.PI*2); ctx.fill();
    }
    ctx.restore();
}

function drawCharacter(x, y, size, color, name, role, alive, isPlayer, skinId) {
    const sx = x - camera.x + canvas.width/2;
    const sy = y - camera.y + canvas.height/2;
    if (sx < -50 || sx > canvas.width+50 || sy < -50 || sy > canvas.height+50) return;

    if (!alive) {
        ctx.globalAlpha = 0.6;
        ctx.fillStyle = '#ff0000';
        ctx.font = '24px Arial'; ctx.textAlign = 'center';
        ctx.fillText('💀', sx, sy + 5);
        ctx.globalAlpha = 1;
        ctx.fillStyle = '#aaa'; ctx.font = '11px Arial';
        ctx.fillText(name, sx, sy + 24);
        return;
    }

    // Shadow
    ctx.fillStyle = 'rgba(0,0,0,0.3)';
    ctx.beginPath(); ctx.ellipse(sx, sy+size, size*0.9, size*0.35, 0, 0, Math.PI*2); ctx.fill();

    // Body
    ctx.fillStyle = color;
    ctx.beginPath(); ctx.arc(sx, sy, size, 0, Math.PI*2); ctx.fill();
    ctx.strokeStyle = isPlayer ? '#fff' : 'rgba(255,255,255,0.25)';
    ctx.lineWidth = isPlayer ? 3 : 1; ctx.stroke();

    // Role icons
    if (role === 'murder' && (isPlayer || gameState === 'ended')) {
        ctx.font = '11px Arial'; ctx.textAlign = 'center';
        ctx.fillStyle = '#ff0044'; ctx.fillText('🗡️', sx, sy - size - 10);
    }
    if (role === 'sheriff' && (isPlayer || gameState === 'ended')) {
        ctx.font = '11px Arial'; ctx.textAlign = 'center';
        ctx.fillStyle = '#44aaff'; ctx.fillText('🔫', sx, sy - size - 10);
    }

    // Name
    ctx.fillStyle = '#fff'; ctx.font = 'bold 12px Arial'; ctx.textAlign = 'center';
    ctx.fillText(name, sx, sy - size - 16);

    // Knife for murder
    if (role === 'murder' && (isPlayer || gameState === 'ended')) {
        drawKnife(sx + 16, sy - 6, skinId || 'classic', Math.sin(Date.now()/150) * 0.3);
    }
}

function drawMap(map) {
    const ox = -camera.x + canvas.width/2, oy = -camera.y + canvas.height/2;
    
    // Floor
    ctx.fillStyle = map.floorColor;
    if (map.name) ctx.fillRect(ox, oy, map.width, map.height);
    else ctx.fillRect(ox, oy, 1000, 700);

    // Grid
    ctx.strokeStyle = 'rgba(255,255,255,0.03)'; ctx.lineWidth = 1;
    const gs = 50;
    for (let x = Math.floor(-ox/gs)*gs; x < -ox+canvas.width+gs*2; x+=gs) {
        ctx.beginPath(); ctx.moveTo(x+ox, oy); ctx.lineTo(x+ox, oy+canvas.height+gs*2); ctx.stroke();
    }
    for (let y = Math.floor(-oy/gs)*gs; y < -oy+canvas.height+gs*2; y+=gs) {
        ctx.beginPath(); ctx.moveTo(ox, y+oy); ctx.lineTo(ox+canvas.width+gs*2, y+oy); ctx.stroke();
    }

    // Decorations
    if (map.decorations) {
        map.decorations.forEach(d => {
            const dx = d.x + ox, dy = d.y + oy;
            if (d.type === 'carpet') { ctx.fillStyle = d.color; ctx.fillRect(dx, dy, d.w, d.h); }
            else if (d.type === 'plant') {
                ctx.fillStyle = '#2d5a1e'; ctx.beginPath(); ctx.arc(dx, dy, 12, 0, Math.PI*2); ctx.fill();
                ctx.fillStyle = '#3a7a28'; ctx.beginPath(); ctx.arc(dx, dy-5, 8, 0, Math.PI*2); ctx.fill();
            }
            else if (d.type === 'lamp') {
                ctx.globalAlpha = 0.25 + Math.sin(Date.now()/400)*0.1;
                ctx.fillStyle = '#ffdd88'; ctx.beginPath(); ctx.arc(dx, dy, 22, 0, Math.PI*2); ctx.fill();
                ctx.globalAlpha = 1; ctx.fillStyle = '#ffcc44'; ctx.beginPath(); ctx.arc(dx, dy, 6, 0, Math.PI*2); ctx.fill();
            }
            else if (d.type === 'sign') {
                ctx.fillStyle = 'rgba(0,0,0,0.65)'; ctx.fillRect(dx-32, dy-9, 64, 22);
                ctx.fillStyle = '#e94560'; ctx.font = 'bold 14px Arial'; ctx.textAlign = 'center';
                ctx.fillText(d.text, dx+10, dy+7);
            }
        });
    }

    // Room labels
    if (map.rooms) {
        map.rooms.forEach(r => {
            const rx = r.x + ox, ry = r.y + oy;
            if (rx + r.w > 0 && rx < canvas.width && ry + r.h > 0 && ry < canvas.height) {
                ctx.fillStyle = 'rgba(255,255,255,0.05)'; ctx.fillRect(rx, ry, r.w, r.h);
                ctx.fillStyle = 'rgba(255,255,255,0.12)'; ctx.font = '10px Arial'; ctx.textAlign = 'center';
                ctx.fillText(r.name, rx + r.w/2, ry + 15);
            }
        });
    }

    // Walls
    map.walls.forEach(w => {
        const wx = w.x + ox, wy = w.y + oy;
        if (wx + w.w > -10 && wx < canvas.width+10 && wy + w.h > -10 && wy < canvas.height+10) {
            ctx.fillStyle = 'rgba(0,0,0,0.35)'; ctx.fillRect(wx+2, wy+2, w.w, w.h);
            ctx.fillStyle = map.wallColor; ctx.fillRect(wx, wy, w.w, w.h);
            ctx.fillStyle = 'rgba(255,255,255,0.08)'; ctx.fillRect(wx, wy, w.w, 2); ctx.fillRect(wx, wy, 2, w.h);
        }
    });
}

function drawParticles() {
    particles.forEach(p => {
        const sx = p.x - camera.x + canvas.width/2;
        const sy = p.y - camera.y + canvas.height/2;
        ctx.globalAlpha = p.life / p.maxLife;
        ctx.fillStyle = p.color;
        ctx.beginPath(); ctx.arc(sx, sy, p.size * (p.life/p.maxLife), 0, Math.PI*2); ctx.fill();
    });
    ctx.globalAlpha = 1;
}

function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    if (gameState === 'lobby') {
        drawMap(LOBBY_MAP);
        bots.forEach(b => drawCharacter(b.x, b.y, b.size, b.color, b.name, b.role, b.alive, false, 'classic'));
        drawCharacter(player.x, player.y, player.size, '#44ff88', 'You', player.role, player.alive, true, selectedSkin);
        drawParticles();
    } 
    else if (gameState === 'countdown') {
        drawMap(GAME_MAP);
        bots.forEach(b => drawCharacter(b.x, b.y, b.size, b.color, b.name, b.role, b.alive, false, 'classic'));
        drawCharacter(player.x, player.y, player.size, '#44ff88', 'You', player.role, player.alive, true, selectedSkin);
        drawParticles();
        
        ctx.fillStyle = 'rgba(0,0,0,0.6)'; ctx.fillRect(0,0,canvas.width,canvas.height);
        ctx.fillStyle = '#fff'; ctx.font = 'bold 72px Arial'; ctx.textAlign = 'center';
        const c = Math.ceil(countdownTimer);
        ctx.fillText(c > 0 ? c : 'GO!', canvas.width/2, canvas.height/2);
    } 
    else if (gameState === 'playing' || gameState === 'ended') {
        drawMap(GAME_MAP);
        bots.forEach(b => drawCharacter(b.x, b.y, b.size, b.color, b.name, b.role, b.alive, false, 'classic'));
        drawCharacter(player.x, player.y, player.size, '#44ff88', 'You', player.role, player.alive, true, selectedSkin);
        drawParticles();

        // Fog of war
        if (gameState === 'playing' && player.alive) {
            const g = ctx.createRadialGradient(canvas.width/2, canvas.height/2, 120, canvas.width/2, canvas.height/2, 450);
            g.addColorStop(0, 'rgba(0,0,0,0)'); g.addColorStop(1, 'rgba(0,0,0,0.45)');
            ctx.fillStyle = g; ctx.fillRect(0,0,canvas.width,canvas.height);
        }
    }

    // Knife HUD for murder
    if (gameState === 'playing' && player.alive && player.role === 'murder') {
        drawKnife(canvas.width - 75, canvas.height - 75, selectedSkin, Math.sin(Date.now()/200) * 0.25);
    }
}

// ============ GAME LOOP ============
function gameLoop() {
    update();
    draw();
    requestAnimationFrame(gameLoop);
}

// ============ START ============
initLobby();
gameLoop();

// Save on unload
window.addEventListener('beforeunload', () => {
    localStorage.setItem('mm2_selected_skin', selectedSkin);
    localStorage.setItem('mm2_stats', JSON.stringify(playerStats));
    if (dbConnected) savePlayerData();
});
