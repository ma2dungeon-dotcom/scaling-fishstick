<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Космический собиратель PRO</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap');
  
  * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; }
  
  body {
    background: radial-gradient(ellipse at center, #0a0a2e 0%, #000 100%);
    color: #fff;
    font-family: 'Orbitron', 'Arial', sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    overflow: hidden;
  }
  
  #gameContainer { 
    position: relative; 
    box-shadow: 0 0 80px rgba(74, 170, 255, 0.6);
    border-radius: 20px;
    overflow: hidden;
  }
  
  canvas { 
    display: block; 
    background: #000; 
    border: 3px solid #4af;
    border-radius: 20px;
  }
  
  .screen {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background: rgba(0, 10, 30, 0.95);
    backdrop-filter: blur(10px);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 10;
    padding: 30px;
    border-radius: 20px;
  }
  
  .hidden { display: none !important; }
  
  h1 {
    font-size: 56px;
    font-weight: 900;
    background: linear-gradient(90deg, #4af, #f4f, #fd3, #4af);
    background-size: 200% auto;
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
    margin-bottom: 20px;
    text-align: center;
    animation: shine 3s linear infinite;
    text-shadow: 0 0 30px rgba(74, 170, 255, 0.5);
    letter-spacing: 3px;
  }
  
  @keyframes shine {
    to { background-position: 200% center; }
  }
  
  h2 { 
    color: #4af; 
    margin: 10px 0;
    text-shadow: 0 0 10px #4af;
  }
  
  .btn {
    background: linear-gradient(135deg, rgba(74, 170, 255, 0.2), rgba(40, 136, 238, 0.2));
    border: 2px solid #4af;
    color: #fff;
    padding: 15px 40px;
    font-size: 18px;
    font-family: 'Orbitron', sans-serif;
    font-weight: 700;
    border-radius: 50px;
    cursor: pointer;
    margin: 10px;
    transition: all 0.3s;
    box-shadow: 0 0 20px rgba(74, 170, 255, 0.4), inset 0 0 20px rgba(74, 170, 255, 0.1);
    text-transform: uppercase;
    letter-spacing: 2px;
    position: relative;
    overflow: hidden;
  }
  
  .btn::before {
    content: '';
    position: absolute;
    top: 50%;
    left: 50%;
    width: 0;
    height: 0;
    border-radius: 50%;
    background: rgba(255, 255, 255, 0.3);
    transform: translate(-50%, -50%);
    transition: width 0.6s, height 0.6s;
  }
  
  .btn:hover::before {
    width: 300px;
    height: 300px;
  }
  
  .btn:hover {
    transform: translateY(-3px);
    box-shadow: 0 0 30px rgba(74, 170, 255, 0.8), inset 0 0 30px rgba(74, 170, 255, 0.2);
    border-color: #fff;
  }
  
  .btn:active {
    transform: translateY(-1px);
  }
  
  .btn:disabled {
    background: rgba(100, 100, 100, 0.2);
    border-color: #555;
    cursor: not-allowed;
    box-shadow: none;
    transform: none;
  }
  
  .btn.gold {
    background: linear-gradient(135deg, rgba(255, 221, 51, 0.2), rgba(255, 136, 0, 0.2));
    border-color: #fd3;
    box-shadow: 0 0 20px rgba(255, 221, 51, 0.4), inset 0 0 20px rgba(255, 221, 51, 0.1);
  }
  
  .btn.gold:hover {
    box-shadow: 0 0 30px rgba(255, 221, 51, 0.8), inset 0 0 30px rgba(255, 221, 51, 0.2);
    border-color: #fff;
  }
  
  .btn.danger {
    background: linear-gradient(135deg, rgba(255, 68, 68, 0.2), rgba(170, 0, 0, 0.2));
    border-color: #f44;
    box-shadow: 0 0 20px rgba(255, 68, 68, 0.4), inset 0 0 20px rgba(255, 68, 68, 0.1);
  }
  
  .btn.danger:hover {
    box-shadow: 0 0 30px rgba(255, 68, 68, 0.8), inset 0 0 30px rgba(255, 68, 68, 0.2);
    border-color: #fff;
  }
  
  .stats-bar {
    position: absolute;
    top: 15px; left: 15px; right: 15px;
    display: flex;
    justify-content: space-between;
    pointer-events: none;
    font-weight: 700;
    z-index: 5;
  }
  
  .stat {
    background: rgba(0, 20, 40, 0.8);
    backdrop-filter: blur(5px);
    padding: 10px 20px;
    border-radius: 25px;
    border: 2px solid rgba(74, 170, 255, 0.5);
    font-size: 16px;
    box-shadow: 0 0 15px rgba(74, 170, 255, 0.3);
    text-shadow: 0 0 5px rgba(74, 170, 255, 0.8);
  }
  
  .xp-bar {
    position: absolute;
    bottom: 15px; left: 15px; right: 15px;
    height: 25px;
    background: rgba(0, 20, 40, 0.8);
    backdrop-filter: blur(5px);
    border: 2px solid #4af;
    border-radius: 15px;
    overflow: hidden;
    box-shadow: 0 0 15px rgba(74, 170, 255, 0.3);
  }
  
  .xp-fill {
    height: 100%;
    background: linear-gradient(90deg, #4f4, #fd3, #f4f);
    background-size: 200% auto;
    animation: gradient 2s linear infinite;
    transition: width 0.3s;
    box-shadow: 0 0 10px rgba(74, 255, 74, 0.5);
  }
  
  @keyframes gradient {
    to { background-position: 200% center; }
  }
  
  .xp-text {
    position: absolute;
    width: 100%;
    text-align: center;
    line-height: 21px;
    font-size: 13px;
    font-weight: 700;
    text-shadow: 0 0 5px #000, 0 0 10px #000;
    letter-spacing: 1px;
  }
  
  .shop {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 15px;
    max-width: 650px;
    margin: 20px 0;
  }
  
  .upgrade {
    background: rgba(74, 170, 255, 0.1);
    backdrop-filter: blur(5px);
    border: 2px solid #4af;
    border-radius: 20px;
    padding: 20px;
    text-align: center;
    min-width: 220px;
    box-shadow: 0 0 20px rgba(74, 170, 255, 0.2);
    transition: all 0.3s;
  }
  
  .upgrade:hover {
    transform: translateY(-5px);
    box-shadow: 0 0 30px rgba(74, 170, 255, 0.4);
  }
  
  .upgrade-title { 
    font-size: 20px; 
    color: #fd3; 
    margin-bottom: 8px;
    text-shadow: 0 0 10px rgba(255, 221, 51, 0.5);
    font-weight: 700;
  }
  
  .upgrade-level { 
    font-size: 14px; 
    color: #aaa;
    letter-spacing: 1px;
  }
  
  .upgrade-desc { 
    font-size: 13px; 
    color: #ccc; 
    margin: 10px 0;
    line-height: 1.4;
  }
  
  .info { 
    font-size: 16px; 
    color: #ccc; 
    margin: 10px 0; 
    text-align: center; 
    max-width: 600px;
    line-height: 1.6;
    letter-spacing: 1px;
  }
  
  .big-score { 
    font-size: 72px; 
    color: #fd3; 
    text-shadow: 0 0 30px #fd3, 0 0 60px #fd3; 
    margin: 15px;
    font-weight: 900;
    letter-spacing: 5px;
  }
  
  .level-up {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    font-size: 56px;
    color: #fd3;
    text-shadow: 0 0 40px #fd3, 0 0 80px #fd3;
    pointer-events: none;
    animation: levelUp 2s forwards;
    z-index: 5;
    font-weight: 900;
    letter-spacing: 5px;
  }
  
  @keyframes levelUp {
    0% { opacity: 0; transform: translate(-50%, -50%) scale(0.5); }
    20% { opacity: 1; transform: translate(-50%, -50%) scale(1.3); }
    80% { opacity: 1; transform: translate(-50%, -70%) scale(1); }
    100% { opacity: 0; transform: translate(-50%, -90%) scale(0.8); }
  }
  
  .glow-text {
    text-shadow: 0 0 10px currentColor, 0 0 20px currentColor;
  }
</style>
</head>
<body>
<div id="gameContainer">
  <canvas id="game" width="800" height="600"></canvas>
  
  <div id="statsBar" class="stats-bar hidden">
    <div class="stat">⭐ <span id="score">0</span></div>
    <div class="stat">💰 <span id="coins">0</span></div>
    <div class="stat">🎯 Ур. <span id="level">1</span></div>
    <div class="stat">❤ <span id="lives">3</span></div>
  </div>
  
  <div id="xpBar" class="xp-bar hidden">
    <div class="xp-fill" id="xpFill" style="width:0%"></div>
    <div class="xp-text" id="xpText">XP: 0 / 100</div>
  </div>
  
  <!-- СТАРТОВЫЙ ЭКРАН -->
  <div id="startScreen" class="screen">
    <h1>🚀 КОСМИЧЕСКИЙ<br>СОБИРАТЕЛЬ PRO</h1>
    <div class="info">
      Собирай ⭐ звёзды, избегай ☄ астероидов<br>
      Получай опыт, прокачивай корабль, открывай улучшения!
    </div>
    <div class="info glow-text" style="color:#4af;">
      <b>👤 Игрок:</b> Уровень <span id="playerLevelStart">1</span> |
      💰 <span id="coinsStart">0</span> монет
    </div>
    <button class="btn" id="startBtn">🎮 Начать игру</button>
    <button class="btn gold" id="shopBtn">🛠 Магазин улучшений</button>
    <div class="info" style="margin-top:20px; color:#888;">
      <b>Управление:</b> WASD / Стрелки
    </div>
  </div>
  
  <!-- МАГАЗИН -->
  <div id="shopScreen" class="screen hidden">
    <h1>🛠 МАГАЗИН</h1>
    <div class="info glow-text" style="color:#fd3;">
      💰 Монеты: <span id="coinsShop" style="font-size:28px;">0</span>
    </div>
    <div class="shop" id="shopGrid"></div>
    <button class="btn" id="backBtn">← Назад</button>
  </div>
  
  <!-- КОНЕЦ ИГРЫ -->
  <div id="gameOverScreen" class="screen hidden">
    <h1 style="background: linear-gradient(90deg, #f44, #f80, #f44); background-size: 200% auto; animation: shine 3s linear infinite;">💥 ИГРА ОКОНЧЕНА</h1>
    <div class="big-score" id="finalScore">0</div>
    <div class="info">
      Заработано: 💰 <span id="earnedCoins" style="color:#fd3; font-size:24px;">0</span> |
      ⭐ Опыт: <span id="earnedXP" style="color:#4f4; font-size:24px;">0</span>
    </div>
    <div class="info glow-text" id="levelUpMsg" style="color:#fd3; font-size:22px;"></div>
    <button class="btn" id="restartBtn">🔄 Играть снова</button>
    <button class="btn gold" id="shopBtn2">🛠 Магазин</button>
    <button class="btn danger" id="menuBtn">🏠 В меню</button>
  </div>
</div>

<script>
// ============ СОХРАНЕНИЕ ПРОГРЕССА ============
const SAVE_KEY = 'spaceCollectorSave_v1';
let save = {
  coins: 0,
  xp: 0,
  playerLevel: 1,
  upgrades: {
    health: 0,
    speed: 0,
    magnet: 0,
    shield: 0,
    crit: 0,
    xpBoost: 0
  }
};

function loadSave() {
  try {
    const s = localStorage.getItem(SAVE_KEY);
    if (s) save = { ...save, ...JSON.parse(s) };
  } catch(e) {}
}

function saveSave() {
  try { localStorage.setItem(SAVE_KEY, JSON.stringify(save)); } catch(e) {}
}

loadSave();

function xpForLevel(lvl) { return Math.floor(100 * Math.pow(1.5, lvl - 1)); }

function addXP(amount) {
  amount = Math.floor(amount * (1 + save.upgrades.xpBoost * 0.2));
  save.xp += amount;
  let leveled = false;
  while (save.xp >= xpForLevel(save.playerLevel)) {
    save.xp -= xpForLevel(save.playerLevel);
    save.playerLevel++;
    save.coins += 50;
    leveled = true;
  }
  saveSave();
  return { leveled, amount };
}

// ============ МАГАЗИН ============
const UPGRADES = {
  health:  { name: '❤ Здоровье',    desc: '+1 жизнь',            icon: '❤',  baseCost: 50,  max: 10 },
  speed:   { name: '⚡ Скорость',    desc: '+10% скорости',       icon: '⚡', baseCost: 40,  max: 10 },
  magnet:  { name: '🧲 Магнит',      desc: 'Притяжение звёзд',    icon: '🧲', baseCost: 80,  max: 5 },
  shield:  { name: '🛡 Стартовый щит', desc: 'Щит в начале',      icon: '🛡', baseCost: 100, max: 3 },
  crit:    { name: '💥 Крит',        desc: '+10% шанс x2 очков',  icon: '💥', baseCost: 120, max: 8 },
  xpBoost: { name: '📚 Опыт',        desc: '+20% получаемого XP', icon: '📚', baseCost: 150, max: 5 }
};

function upgradeCost(key) {
  return Math.floor(UPGRADES[key].baseCost * Math.pow(1.8, save.upgrades[key]));
}

function renderShop() {
  document.getElementById('coinsShop').textContent = save.coins;
  const grid = document.getElementById('shopGrid');
  grid.innerHTML = '';
  for (const key in UPGRADES) {
    const u = UPGRADES[key];
    const lvl = save.upgrades[key];
    const cost = upgradeCost(key);
    const maxed = lvl >= u.max;
    const canBuy = save.coins >= cost && !maxed;
    
    const div = document.createElement('div');
    div.className = 'upgrade';
    div.innerHTML = `
      <div class="upgrade-title">${u.icon} ${u.name}</div>
      <div class="upgrade-level">Уровень ${lvl} / ${u.max}</div>
      <div class="upgrade-desc">${u.desc}</div>
      <button class="btn gold" ${!canBuy ? 'disabled' : ''} data-upgrade="${key}">
        ${maxed ? 'МАКС' : `💰 ${cost}`}
      </button>
    `;
    grid.appendChild(div);
  }
  
  // Добавляем обработчики на кнопки покупки
  grid.querySelectorAll('button[data-upgrade]').forEach(btn => {
    btn.addEventListener('click', () => buyUpgrade(btn.dataset.upgrade));
  });
}

function buyUpgrade(key) {
  const cost = upgradeCost(key);
  if (save.coins >= cost && save.upgrades[key] < UPGRADES[key].max) {
    save.coins -= cost;
    save.upgrades[key]++;
    saveSave();
    renderShop();
    updateMenuStats();
  }
}

function showShop() {
  document.getElementById('startScreen').classList.add('hidden');
  document.getElementById('gameOverScreen').classList.add('hidden');
  document.getElementById('shopScreen').classList.remove('hidden');
  renderShop();
}

function hideShop() {
  document.getElementById('shopScreen').classList.add('hidden');
  document.getElementById('startScreen').classList.remove('hidden');
}

function backToMenu() {
  document.getElementById('gameOverScreen').classList.add('hidden');
  document.getElementById('startScreen').classList.remove('hidden');
  updateMenuStats();
}

function updateMenuStats() {
  document.getElementById('playerLevelStart').textContent = save.playerLevel;
  document.getElementById('coinsStart').textContent = save.coins;
}

updateMenuStats();

// ============ ОБРАБОТЧИКИ КНОПОК ============
document.getElementById('startBtn').addEventListener('click', startGame);
document.getElementById('shopBtn').addEventListener('click', showShop);
document.getElementById('backBtn').addEventListener('click', hideShop);
document.getElementById('restartBtn').addEventListener('click', startGame);
document.getElementById('shopBtn2').addEventListener('click', showShop);
document.getElementById('menuBtn').addEventListener('click', backToMenu);

// ============ ИГРА ============
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const W = canvas.width, H = canvas.height;

const keys = {};
document.addEventListener('keydown', e => {
  keys[e.key.toLowerCase()] = true;
  if (['arrowup','arrowdown','arrowleft','arrowright',' '].includes(e.key.toLowerCase())) e.preventDefault();
});
document.addEventListener('keyup', e => keys[e.key.toLowerCase()] = false);

// Звуки
let audioCtx;
function initAudio() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
}

function playSound(freq, duration, type = 'sine', vol = 0.2) {
  if (!audioCtx) return;
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.type = type;
  osc.frequency.value = freq;
  gain.gain.setValueAtTime(vol, audioCtx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
  osc.connect(gain);
  gain.connect(audioCtx.destination);
  osc.start();
  osc.stop(audioCtx.currentTime + duration);
}

const sfx = {
  collect: () => { playSound(880, 0.1); setTimeout(() => playSound(1320, 0.1), 50); },
  hit: () => playSound(150, 0.3, 'sawtooth', 0.3),
  powerup: () => { playSound(660, 0.1); setTimeout(() => playSound(880, 0.1), 80); setTimeout(() => playSound(1320, 0.15), 160); },
  levelUp: () => { playSound(523, 0.15); setTimeout(() => playSound(659, 0.15), 100); setTimeout(() => playSound(784, 0.15), 200); setTimeout(() => playSound(1047, 0.3), 300); },
  coin: () => playSound(1200, 0.08, 'square', 0.15)
};

// Игровые объекты
let player, stars, enemies, powerups, particles, bgStars, coins;
let score, lives, level, gameRunning, gameTime, spawnTimer, difficultyTimer;
let shieldTime, speedTime, magnetTime;
let earnedCoinsThisRun, earnedXPThisRun;
let lastTime;

function rand(a, b) { return a + Math.random() * (b - a); }

function initBgStars() {
  bgStars = [];
  for (let i = 0; i < 150; i++) {
    bgStars.push({ x: Math.random() * W, y: Math.random() * H, size: Math.random() * 2 + 0.5, speed: Math.random() * 30 + 10 });
  }
}

function startGame() {
  initAudio();
  
  player = { x: W/2, y: H/2, r: 14, baseSpeed: 300 };
  stars = [];
  enemies = [];
  powerups = [];
  particles = [];
  coins = [];
  
  score = 0;
  lives = 3 + save.upgrades.health;
  level = 1;
  gameTime = 0;
  spawnTimer = 0;
  difficultyTimer = 0;
  shieldTime = save.upgrades.shield > 0 ? 5 * save.upgrades.shield : 0;
  speedTime = 0;
  magnetTime = 0;
  earnedCoinsThisRun = 0;
  earnedXPThisRun = 0;
  gameRunning = true;
  
  for (let i = 0; i < 5; i++) spawnStar();
  initBgStars();
  
  document.getElementById('startScreen').classList.add('hidden');
  document.getElementById('gameOverScreen').classList.add('hidden');
  document.getElementById('shopScreen').classList.add('hidden');
  document.getElementById('statsBar').classList.remove('hidden');
  document.getElementById('xpBar').classList.remove('hidden');
  
  lastTime = performance.now();
  requestAnimationFrame(gameLoop);
}

function spawnStar() {
  stars.push({
    x: rand(50, W - 50),
    y: rand(50, H - 50),
    r: 10,
    pulse: Math.random() * Math.PI * 2,
    value: Math.random() < 0.1 ? 50 : 10
  });
}

function spawnEnemy() {
  const type = Math.random() < 0.2 + level * 0.05 ? (Math.random() < 0.5 ? 1 : 2) : 0;
  let x, y, vx, vy, r;
  const side = Math.floor(Math.random() * 4);
  if (side === 0) { x = -30; y = rand(0, H); }
  else if (side === 1) { x = W + 30; y = rand(0, H); }
  else if (side === 2) { x = rand(0, W); y = -30; }
  else { x = rand(0, W); y = H + 30; }
  
  const speed = 60 + level * 10;
  if (type === 0) {
    const angle = Math.atan2(player.y - y, player.x - x) + rand(-0.5, 0.5);
    vx = Math.cos(angle) * rand(speed, speed + 60);
    vy = Math.sin(angle) * rand(speed, speed + 60);
    r = rand(15, 25);
  } else if (type === 1) {
    const angle = Math.atan2(player.y - y, player.x - x);
    vx = Math.cos(angle) * (speed + 100);
    vy = Math.sin(angle) * (speed + 100);
    r = 12;
  } else {
    const angle = Math.atan2(player.y - y, player.x - x);
    vx = Math.cos(angle) * speed * 0.7;
    vy = Math.sin(angle) * speed * 0.7;
    r = 30;
  }
  
  enemies.push({ x, y, vx, vy, r, type, rotation: 0, rotSpeed: rand(-2, 2) });
}

function spawnPowerup() {
  const types = ['shield', 'speed', 'magnet', 'coin'];
  const type = types[Math.floor(Math.random() * types.length)];
  powerups.push({
    x: rand(50, W - 50),
    y: rand(50, H - 50),
    r: 15,
    type,
    pulse: 0,
    life: 10
  });
}

function spawnParticles(x, y, count, color, speed = 200) {
  for (let i = 0; i < count; i++) {
    const angle = Math.random() * Math.PI * 2;
    const s = rand(speed * 0.3, speed);
    particles.push({
      x, y,
      vx: Math.cos(angle) * s,
      vy: Math.sin(angle) * s,
      r: rand(2, 5),
      life: 1,
      color
    });
  }
}

function spawnCoin(x, y, amount) {
  for (let i = 0; i < amount; i++) {
    const angle = Math.random() * Math.PI * 2;
    const s = rand(100, 200);
    coins.push({
      x, y,
      vx: Math.cos(angle) * s,
      vy: Math.sin(angle) * s,
      life: 1,
      collected: false
    });
  }
}

function dist(a, b) { return Math.hypot(a.x - b.x, a.y - b.y); }

function update(dt) {
  gameTime += dt;
  spawnTimer += dt;
  difficultyTimer += dt;
  
  if (difficultyTimer > 20) {
    difficultyTimer = 0;
    level++;
    sfx.levelUp();
    showLevelUp();
  }
  
  const spawnRate = Math.max(0.3, 1.5 - level * 0.1);
  if (spawnTimer > spawnRate) {
    spawnTimer = 0;
    spawnEnemy();
    if (Math.random() < 0.1) spawnPowerup();
  }
  
  if (shieldTime > 0) shieldTime -= dt;
  if (speedTime > 0) speedTime -= dt;
  if (magnetTime > 0) magnetTime -= dt;
  
  let dx = 0, dy = 0;
  if (keys['arrowup'] || keys['w']) dy -= 1;
  if (keys['arrowdown'] || keys['s']) dy += 1;
  if (keys['arrowleft'] || keys['a']) dx -= 1;
  if (keys['arrowright'] || keys['d']) dx += 1;
  
  if (dx !== 0 || dy !== 0) {
