            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', 'Poppins', -apple-system, BlinkMacSystemFont, 'Roboto', sans-serif;
        }
        
        /* 3D Canvas Background */
        #canvas-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -2;
            background: radial-gradient(circle at center, #0a0a2a 0%, #030318 100%);

        /* Glassmorphism эффекты */

            backdrop-filter: blur(2px);

            border: 1px solid rgba(88, 130, 255, 0.3);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2), 0 0 0 1px rgba(88, 130, 255, 0.1) inset;

            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.3), 0 0 0 1px rgba(88, 130, 255, 0.3) inset;

            background: rgba(18, 22, 45, 0.85);
            backdrop-filter: blur(16px);
            border-radius: 32px;

        }
        
        .auth-tabs {

            gap: 20px;
            margin-bottom: 32px;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 60px;
            padding: 4px;
        }
        
        .auth-tab {

            padding: 12px;

            font-weight: 600;
            color: #a0a8c0;
            transition: 0.2s;
            border-radius: 60px;
            font-size: 16px;

    <script type="module">
        import * as THREE from 'three';
        
        // 3D Scene Setup
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        scene.background = null;
        scene.fog = new THREE.FogExp2(0x030318, 0.003);
        
        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 2, 12);
        
        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        container.appendChild(renderer.domElement);
        
        // Stars Background
        const starGeometry = new THREE.BufferGeometry();
        const starCount = 1500;
        const starPositions = new Float32Array(starCount * 3);
        for (let i = 0; i < starCount; i++) {
            starPositions[i*3] = (Math.random() - 0.5) * 2000;
            starPositions[i*3+1] = (Math.random() - 0.5) * 1000;
            starPositions[i*3+2] = (Math.random() - 0.5) * 100 - 50;
        }
        starGeometry.setAttribute('position', new THREE.BufferAttribute(starPositions, 3));
        const starMaterial = new THREE.PointsMaterial({ color: 0xffffff, size: 0.3, transparent: true, opacity: 0.7 });
        const stars = new THREE.Points(starGeometry, starMaterial);
        scene.add(stars);
        
        // Floating Crystal Ring (3D Torus)
        const ringGeometry = new THREE.TorusGeometry(2.5, 0.08, 64, 300);
        const ringMaterial = new THREE.MeshStandardMaterial({ color: 0x2d81e0, emissive: 0x1a3a6a, emissiveIntensity: 0.5, metalness: 0.8, roughness: 0.2 });
        const ring = new THREE.Mesh(ringGeometry, ringMaterial);
        ring.position.y = 1;
        scene.add(ring);
        
        const ring2Geometry = new THREE.TorusGeometry(3.2, 0.05, 64, 300);
        const ring2Material = new THREE.MeshStandardMaterial({ color: 0x8b5cf6, emissive: 0x4a1d8c, emissiveIntensity: 0.3 });
        const ring2 = new THREE.Mesh(ring2Geometry, ring2Material);
        ring2.position.y = 1;
        ring2.rotation.x = Math.PI / 2;
        scene.add(ring2);
        
        // Floating Particles around rings
        const particleCount = 800;
        const particleGeo = new THREE.BufferGeometry();
        const particlePositions = new Float32Array(particleCount * 3);
        for (let i = 0; i < particleCount; i++) {
            const angle = (i / particleCount) * Math.PI * 2;
            const radius = 3.8;
            particlePositions[i*3] = Math.cos(angle) * radius + (Math.random() - 0.5) * 0.5;
            particlePositions[i*3+1] = Math.sin(angle) * radius * 0.5 + 1 + (Math.random() - 0.5) * 0.8;
            particlePositions[i*3+2] = Math.sin(angle) * radius * 0.8 + (Math.random() - 0.5) * 0.5;
        }
        particleGeo.setAttribute('position', new THREE.BufferAttribute(particlePositions, 3));
        const particleMat = new THREE.PointsMaterial({ color: 0x5a9eff, size: 0.08, transparent: true, blending: THREE.AdditiveBlending });
        const particles = new THREE.Points(particleGeo, particleMat);
        scene.add(particles);
        
        // Central glowing orb
        const orbGeometry = new THREE.SphereGeometry(0.6, 32, 32);
        const orbMaterial = new THREE.MeshStandardMaterial({ color: 0x2d81e0, emissive: 0x2d81e0, emissiveIntensity: 1.2, metalness: 0.9 });
        const orb = new THREE.Mesh(orbGeometry, orbMaterial);
        orb.position.y = 1;
        scene.add(orb);
        
        // Lights
        const ambientLight = new THREE.AmbientLight(0x222222);
        scene.add(ambientLight);
        const pointLight = new THREE.PointLight(0x2d81e0, 1);
        pointLight.position.set(3, 5, 5);
        scene.add(pointLight);
        const pointLight2 = new THREE.PointLight(0x8b5cf6, 0.8);
        pointLight2.position.set(-3, 4, 6);
        scene.add(pointLight2);
        const backLight = new THREE.DirectionalLight(0xffffff, 0.5);
        backLight.position.set(0, 2, -5);
        scene.add(backLight);
        
        // Animation
        let time = 0;
        function animate() {
            requestAnimationFrame(animate);
            time += 0.008;
            
            ring.rotation.x = Math.sin(time * 0.3) * 0.3;
            ring.rotation.y = time * 0.5;
            ring.rotation.z = Math.cos(time * 0.2) * 0.2;
            
            ring2.rotation.x = time * 0.3;
            ring2.rotation.z = time * 0.4;
            
            particles.rotation.y = time * 0.1;
            particles.rotation.x = Math.sin(time * 0.2) * 0.1;
            
            stars.rotation.y = time * 0.02;
            stars.rotation.x = time * 0.01;
            
            orb.scale.setScalar(1 + Math.sin(time * 5) * 0.05);
            
            camera.position.x = Math.sin(time * 0.1) * 0.5;
            camera.position.y = 2 + Math.sin(time * 0.2) * 0.1;
            camera.lookAt(0, 1.5, 0);
            
            renderer.render(scene, camera);
        }
        
        animate();
        
        window.addEventListener('resize', onWindowResize, false);
        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }
    </script>

        function getAvatarHtml(url, size = 'lg') {
            if (url && url !== '' && url !== 'https://via.placeholder.com/96?text=Avatar') {
                if (size === 'lg') return `<img src="${url}" class="avatar-lg" onerror="this.onerror=null; this.src='';">`;
                return `<img src="${url}" class="avatar-sm" onerror="this.onerror=null; this.src='';">`;
            }
            return renderAvatarPlaceholder(size);
        }
        
        function updateSidebarAvatar() {
            const container = document.getElementById('currentAvatarContainer');
            if (!currentUserObj) return;
            container.innerHTML = getAvatarHtml(currentUserObj.avatarURL, 'lg');
        }
        
        async function getUserData(uid) {
            try {
                const snap = await db.ref(`users/${uid}`).once('value');
                return snap.val();
            } catch(e) { return null; }
        }
        
        async function updateSidebar() {
            if (!currentUserObj) return;
            const userData = await getUserData(currentUserObj.uid);
            const name = userData?.name || 'Путник';
            document.getElementById('currentUserName').innerText = name;
            currentUserObj.name = name;
            currentUserObj.avatarURL = userData?.avatarURL || '';
            updateSidebarAvatar();
            document.getElementById('userStatusText').innerText = userData?.email || '';
        }
        
        function showView(viewId) {
            const views = { feed:'feedView', messages:'messagesView', search:'searchView', profile:'profileView' };
            Object.values(views).forEach(v => { const el = document.getElementById(v); if(el) el.style.display = 'none'; });
            document.getElementById(views[viewId]).style.display = 'block';
            const icons = { feed:'navFeed', messages:'navMessages', search:'navSearch', profile:'navProfile' };
            document.querySelectorAll('.nav-icons i').forEach(icon => icon.classList.remove('active-nav'));
            document.getElementById(icons[viewId]).classList.add('active-nav');
            if (viewId === 'messages' && currentUserObj) loadDialogs();
            if (viewId === 'profile') loadProfileById(currentUserObj.uid);
        }
        
        function loadFeed() {
            if (!db) return;
            db.ref('posts').on('value', (snap) => {
                const posts = [];
                snap.forEach(child => posts.push({ id: child.key, ...child.val() }));
                posts.sort((a,b) => b.timestamp - a.timestamp);
                const container = document.getElementById('postsList');
                if (!container) return;
                if (posts.length === 0) { container.innerHTML = '<div class="empty-posts">🌟 Нет постов. Напишите первое приключение!</div>'; return; }
                container.innerHTML = '';
                posts.forEach(post => {
                    const avatarHtml = getAvatarHtml(post.authorAvatar, 'sm');
                    const div = document.createElement('div');
                    div.className = 'feed-item';
                    div.innerHTML = `
                        <div class="user-row">
                            ${avatarHtml}
                            <b>${escapeHtml(post.authorName)}</b>
                            <span style="font-size:12px; color:#8a92b0;">${new Date(post.timestamp).toLocaleString()}</span>
                        </div>
                        <div>${escapeHtml(post.text)}</div>
                    `;
                    container.appendChild(div);
                });
            });
        }
        
        function searchUsers(query) {
            if (!db || !currentUserObj) return;
            db.ref('users').once('value', (snap) => {
                const results = [];
                snap.forEach(child => {
                    const user = child.val();
                    if (user.uid !== currentUserObj.uid && user.name?.toLowerCase().includes(query.toLowerCase())) {
                        results.push({ uid: child.key, name: user.name, avatarURL: user.avatarURL });
                    }
                });
                const container = document.getElementById('searchResults');
                if (!container) return;
                if (results.length === 0) { container.innerHTML = '<div>🔮 Никого не найдено</div>'; return; }
                container.innerHTML = '';
                results.forEach(u => {
                    const avatarHtml = getAvatarHtml(u.avatarURL, 'sm');
                    const div = document.createElement('div');
                    div.className = 'user-list-item';
                    div.innerHTML = `${avatarHtml}<span>${escapeHtml(u.name)}</span>`;
                    div.onclick = () => openUserProfile(u.uid);
                    container.appendChild(div);
                });
            });
        }
        
        function openUserProfile(uid) { showView('profile'); loadProfileById(uid); }
        
        async function loadProfileById(uid) {
            const userData = await getUserData(uid);
            if (!userData) return;
            const isOwn = uid === currentUserObj?.uid;
            const avatarHtml = getAvatarHtml(userData.avatarURL, 'lg');
            const container = document.getElementById('profileDetailCard');
            container.innerHTML = `
                <div style="text-align:center;">
                    ${avatarHtml}
                    <h2>${escapeHtml(userData.name)}</h2>
                    <div style="color:#8a92b0;">${escapeHtml(userData.email || '')}</div>
                    ${!isOwn ? `<button id="startChatBtn" style="margin-top:18px; background:linear-gradient(135deg,#2d81e0,#1a5bbf); padding:10px 24px; border-radius:40px; color:white;">💌 Написать</button>` : ''}
                </div>
            `;
            if (!isOwn) document.getElementById('startChatBtn')?.addEventListener('click', () => {
                currentChatWith = uid; showView('messages'); loadDialogs(); setTimeout(() => openChatWith(uid), 300);
            });
        }
        
        async function loadDialogs() {
            if (!db || !currentUserObj) return;
            const msgsRef = db.ref(`messages/${currentUserObj.uid}`);
            msgsRef.on('value', async (snap) => {
                const dialogsMap = new Map();
                snap.forEach(child => dialogsMap.set(child.key, child.val()));
                const dialogListDiv = document.getElementById('dialogsList');
                dialogListDiv.innerHTML = '';
                for (let [withId] of dialogsMap.entries()) {
                    const partnerData = await getUserData(withId);
                    if (!partnerData) continue;
                    const avatarHtml = getAvatarHtml(partnerData.avatarURL, 'sm');
                    const div = document.createElement('div');
                    div.className = 'user-list-item';
                    div.innerHTML = `${avatarHtml}<div><b>${escapeHtml(partnerData.name)}</b></div>`;
                    div.onclick = () => openChatWith(withId);
                    dialogListDiv.appendChild(div);
                }
                if (dialogsMap.size === 0) dialogListDiv.innerHTML = '<div>💫 Нет диалогов</div>';
            });
        }
        
        function openChatWith(partnerId) {
            currentChatWith = partnerId;
            getUserData(partnerId).then(u => { document.getElementById('chatHeader').innerHTML = `<strong>💬 Чат с ${escapeHtml(u?.name)}</strong>`; });
            document.getElementById('sendMsgArea').style.display = 'flex';
            loadMessages(partnerId);
        }
        
        function loadMessages(partnerId) {
            if (!db || !currentUserObj) return;
            const chatId = currentUserObj.uid < partnerId ? `${currentUserObj.uid}_${partnerId}` : `${partnerId}_${currentUserObj.uid}`;
            db.ref(`chat_rooms/${chatId}/messages`).off();
            db.ref(`chat_rooms/${chatId}/messages`).on('value', (snap) => {
                const msgs = [];
                snap.forEach(child => msgs.push({ id: child.key, ...child.val() }));
                msgs.sort((a,b)=> a.timestamp - b.timestamp);
                const container = document.getElementById('messagesList');
                container.innerHTML = '';
                msgs.forEach(m => {
                    const isMe = m.sender === currentUserObj.uid;
                    const bubble = document.createElement('div');
                    bubble.className = `msg-bubble ${isMe ? 'msg-out' : 'msg-in'}`;
                    bubble.style.marginLeft = isMe ? 'auto' : '0';
                    bubble.innerText = m.text;
                    container.appendChild(bubble);
                });
                container.scrollTop = container.scrollHeight;
            });
        }
        
        async function sendMessage(text) {
            if (!currentChatWith || !text.trim()) return;
            const chatId = currentUserObj.uid < currentChatWith ? `${currentUserObj.uid}_${currentChatWith}` : `${currentChatWith}_${currentUserObj.uid}`;
            await db.ref(`chat_rooms/${chatId}/messages`).push({ sender: currentUserObj.uid, receiver: currentChatWith, text, timestamp: Date.now() });
            await db.ref().update({
                [`messages/${currentUserObj.uid}/${currentChatWith}/lastMessage`]: text,
                [`messages/${currentUserObj.uid}/${currentChatWith}/updated`]: Date.now(),
                [`messages/${currentChatWith}/${currentUserObj.uid}/lastMessage`]: text,
                [`messages/${currentChatWith}/${currentUserObj.uid}/updated`]: Date.now()
            });
            document.getElementById('messageInput').value = '';
        }
        
        async function loadRealUsers() {
            if (!db || !currentUserObj) return;
            const snap = await db.ref('users').once('value');
            const users = [];
            snap.forEach(child => { if (child.key !== currentUserObj.uid) users.push({ uid: child.key, name: child.val().name, avatar: child.val().avatarURL }); });
            const container = document.getElementById('suggestedUsers');
            container.innerHTML = '';
            if (users.length === 0) { container.innerHTML = '<div>😴 Пока нет других путников</div>'; return; }
            users.slice(0, 6).forEach(u => {
                const avatarHtml = getAvatarHtml(u.avatar, 'sm');
                const div = document.createElement('div');
                div.className = 'user-list-item';
                div.innerHTML = `${avatarHtml}<span>${escapeHtml(u.name)}</span>`;
                div.onclick = () => openUserProfile(u.uid);
                container.appendChild(div);
            });
        }
        
        function setupAvatarUpload() {
            const fileInput = document.getElementById('avatarUploadInput');
            fileInput.addEventListener('change', async (e) => {
                const file = e.target.files[0];
                if (!file || !storage || !currentUserObj) return;
                const storageRef = storage.ref(`avatars/${currentUserObj.uid}`);
                await storageRef.put(file);
                const url = await storageRef.getDownloadURL();
                await db.ref(`users/${currentUserObj.uid}`).update({ avatarURL: url });
                currentUserObj.avatarURL = url;
                updateSidebar();
                alert('✅ Облик обновлён!');
            });
        }
        
        function escapeHtml(str) { if (!str) return ''; return str.replace(/[&<>]/g, m => ({ '&':'&amp;', '<':'&lt;', '>':'&gt;' }[m])); }
        
        auth.onAuthStateChanged(async (user) => {
            if (user) {
                let userData = (await db.ref(`users/${user.uid}`).once('value')).val();
                if (!userData) { userData = { uid: user.uid, name: user.email.split('@')[0], email: user.email, avatarURL: '' }; await db.ref(`users/${user.uid}`).set(userData); }
                currentUserObj = { uid: user.uid, name: userData.name, avatarURL: userData.avatarURL || '' };
                authSection.style.display = 'none';
                appContainer.style.display = 'block';
                updateSidebar();
                loadFeed();
                loadRealUsers();
                setupAvatarUpload();
                showView('feed');
            } else {
                authSection.style.display = 'block';
                appContainer.style.display = 'none';
                currentUserObj = null;
            }
        });
        
        // Event listeners
        document.getElementById('loginTab').onclick = () => { document.getElementById('loginTab').classList.add('active'); document.getElementById('registerTab').classList.remove('active'); document.getElementById('loginForm').style.display = 'block'; document.getElementById('registerForm').style.display = 'none'; };
        document.getElementById('registerTab').onclick = () => { document.getElementById('registerTab').classList.add('active'); document.getElementById('loginTab').classList.remove('active'); document.getElementById('loginForm').style.display = 'none'; document.getElementById('registerForm').style.display = 'block'; };
        document.getElementById('doLoginBtn').onclick = async () => { try { await auth.signInWithEmailAndPassword(document.getElementById('loginEmail').value, document.getElementById('loginPassword').value); } catch(e) { document.getElementById('loginError').innerText = e.message; } };
        document.getElementById('doRegisterBtn').onclick = async () => { const name = document.getElementById('regName').value.trim(); const email = document.getElementById('regEmail').value; const pwd = document.getElementById('regPassword').value; if (pwd.length < 6) { document.getElementById('regError').innerText = 'Пароль ≥6 символов'; return; } try { await auth.createUserWithEmailAndPassword(email, pwd); const uid = auth.currentUser.uid; await db.ref(`users/${uid}`).set({ uid, name, email, avatarURL: '', createdAt: Date.now() }); } catch(e) { document.getElementById('regError').innerText = e.message; } };
        document.getElementById('logoutBtn').onclick = () => auth.signOut();
        document.getElementById('submitPostBtn').onclick = async () => { const text = document.getElementById('postText').value.trim(); if (!text) return; await db.ref('posts').push({ authorId: currentUserObj.uid, authorName: currentUserObj.name, authorAvatar: currentUserObj.avatarURL || '', text, timestamp: Date.now() }); document.getElementById('postText').value = ''; };
        document.getElementById('sendMsgBtn').onclick = () => sendMessage(document.getElementById('messageInput').value);
        document.getElementById('searchUsersInput').addEventListener('input', (e) => searchUsers(e.target.value));
        document.getElementById('navFeed').onclick = () => showView('feed');
        document.getElementById('navMessages').onclick = () => showView('messages');
        document.getElementById('navSearch').onclick = () => showView('search');
        document.getElementById('navProfile').onclick = () => showView('profile');
    </script>
</body>
</html>
