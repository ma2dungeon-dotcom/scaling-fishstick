<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>2D Bloxburg Expansion</title>
    <style>
        body { margin: 0; overflow: hidden; background: #222; font-family: sans-serif; }
        canvas { display: block; }
        #ui {
            position: absolute; top: 10px; left: 10px;
            background: rgba(255, 255, 255, 0.9); padding: 15px;
            border-radius: 10px; pointer-events: none; z-index: 10;
        }
        .msg {
            position: absolute; bottom: 20px; width: 100%; text-align: center;
            color: white; font-size: 20px; text-shadow: 2px 2px 4px #000;
        }
    </style>
</head>
<body>

<div id="ui">
    <div id="moneyLabel">Деньги: $0</div>
    <div id="locLabel">Локация: Улица</div>
    <div id="itemsLabel">Мебель: 0 / 3</div>
    <div style="font-size: 12px; color: #555;">WASD - Движение | E - Вход/Выход</div>
</div>
<div id="msgLabel" class="msg"></div>

<canvas id="gameCanvas"></canvas>

<script>
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");

// Настройки мира
const WORLD_SIZE = 2000;
const INTERIOR_SIZE = 600;
let money = 200;
let locationState = "street"; // street, house, shop
let itemsOwned = { chair: false, table: false, bed: false };

// Игрок
let player = { x: 1000, y: 1000, size: 30, speed: 5 };
let camera = { x: 0, y: 0 };

// Объекты на улице
const housePos = { x: 900, y: 900, w: 200, h: 200 };
const shopPos = { x: 1300, y: 900, w: 200, h: 150 };
const workPos = { x: 1100, y: 1300, r: 50 };

// Погода
const weatherTypes = ["#7cfc00", "#4682B4", "#F0F8FF"]; // Солнце, Дождь, Снег
let weatherIdx = 0;
setInterval(() => { weatherIdx = (weatherIdx + 1) % weatherTypes.length; }, 180000);

// Управление
let keys = {};
window.onkeydown = (e) => { keys[e.code] = true; if(e.code === 'KeyE') tryEnter(); };
window.onkeyup = (e) => keys[e.code] = false;

function tryEnter() {
    if (locationState === "street") {
        if (player.x > housePos.x && player.x < housePos.x + housePos.w && Math.abs(player.y - (housePos.y + housePos.h)) < 40) {
            locationState = "house"; player.x = 300; player.y = 500;
        } else if (player.x > shopPos.x && player.x < shopPos.x + shopPos.w && Math.abs(player.y - (shopPos.y + shopPos.h)) < 40) {
            locationState = "shop"; player.x = 300; player.y = 500;
        }
    } else {
        if (player.y > 550) { 
            let oldLoc = locationState;
            locationState = "street";
            player.y = 1120;
            player.x = (oldLoc === "house") ? 1000 : 1400;
        }
    }
}

function update() {
    let limit = (locationState === "street") ? WORLD_SIZE : INTERIOR_SIZE;
    
    if (keys["KeyW"] && player.y > 0) player.y -= player.speed;
    if (keys["KeyS"] && player.y < limit) player.y += player.speed;
    if (keys["KeyA"] && player.x > 0) player.x -= player.speed;
    if (keys["KeyD"] && player.x < limit) player.x += player.speed;

    // Работа
    if (locationState === "street") {
        let d = Math.hypot(player.x - workPos.x, player.y - workPos.y);
        if (d < workPos.r) money += 0.5;
    }

    // Магазин (покупка при касании предметов внутри)
    if (locationState === "shop") {
        if (player.y < 200) {
            if (player.x < 200 && !itemsOwned.chair && money >= 50) { itemsOwned.chair = true; money -= 50; }
            if (player.x > 250 && player.x < 350 && !itemsOwned.table && money >= 100) { itemsOwned.table = true; money -= 100; }
            if (player.x > 400 && !itemsOwned.bed && money >= 200) { itemsOwned.bed = true; money -= 200; }
        }
    }

    // Проверка победы
    let count = Object.values(itemsOwned).filter(v => v).length;
    document.getElementById("itemsLabel").innerText = `Мебель: ${count} / 3`;
    if (count === 3) document.getElementById("msgLabel").innerText = "ПОБЕДА! ВЫ ОБУСТРОИЛИ ВЕСЬ ДОМ!";

    // Камера
    camera.x = player.x - canvas.width / 2;
    camera.y = player.y - canvas.height / 2;
    
    document.getElementById("moneyLabel").innerText = `Деньги: $${Math.floor(money)}`;
    document.getElementById("locLabel").innerText = `Локация: ${locationState}`;
}

function draw() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    ctx.clearRect(0,0, canvas.width, canvas.height);

    ctx.save();
    ctx.translate(-camera.x, -camera.y);

    if (locationState === "street") {
        // Улица
        ctx.fillStyle = weatherTypes[weatherIdx];
        ctx.fillRect(0,0, WORLD_SIZE, WORLD_SIZE);
        
        // Границы
        ctx.strokeStyle = "red"; ctx.lineWidth = 10;
        ctx.strokeRect(0,0, WORLD_SIZE, WORLD_SIZE);

        // Работа
        ctx.fillStyle = "yellow"; ctx.beginPath();
        ctx.arc(workPos.x, workPos.y, workPos.r, 0, 7); ctx.fill();

        // Дом и Магазин
        ctx.fillStyle = "#8B4513"; ctx.fillRect(housePos.x, housePos.y, housePos.w, housePos.h);
        ctx.fillStyle = "#555"; ctx.fillRect(shopPos.x, shopPos.y, shopPos.w, shopPos.h);
        ctx.fillStyle = "white"; 
        ctx.fillText("ДОМ (E)", housePos.x + 70, housePos.y + 220);
        ctx.fillText("МАГАЗИН (E)", shopPos.x + 60, shopPos.y + 170);

    } else {
        // Интерьер (Общий для дома и магазина)
        ctx.fillStyle = "#e5c4a3"; ctx.fillRect(0,0, INTERIOR_SIZE, INTERIOR_SIZE);
        ctx.strokeStyle = "#5d4037"; ctx.lineWidth = 20; ctx.strokeRect(0,0, INTERIOR_SIZE, INTERIOR_SIZE);
        ctx.fillStyle = "#8B4513"; ctx.fillRect(250, 580, 100, 20); // Выход

        if (locationState === "house") {
            ctx.fillStyle = "black"; ctx.fillText("ВАШ ДОМ", 270, 30);
            if(itemsOwned.chair) { ctx.fillStyle = "orange"; ctx.fillRect(100, 100, 40, 40); }
            if(itemsOwned.table) { ctx.fillStyle = "brown"; ctx.fillRect(250, 250, 100, 60); }
            if(itemsOwned.bed) { ctx.fillStyle = "white"; ctx.fillRect(450, 100, 80, 120); }
        } else {
            ctx.fillStyle = "black"; ctx.fillText("МАГАЗИН МЕБЕЛИ", 250, 30);
            ctx.fillStyle = "orange"; ctx.fillRect(50, 100, 40, 40); ctx.fillText("Стул $50", 50, 90);
            ctx.fillStyle = "brown"; ctx.fillRect(270, 100, 100, 60); ctx.fillText("Стол $100", 270, 90);
            ctx.fillStyle = "white"; ctx.fillRect(470, 100, 80, 80); ctx.fillText("Кровать $200", 470, 90);
        }
    }

    // Игрок
    ctx.fillStyle = "blue";
    ctx.fillRect(player.x - player.size/2, player.y - player.size/2, player.size, player.size);
    
    ctx.restore();
    update();
    requestAnimationFrame(draw);
}
draw();
</script>
</body>
</html>
