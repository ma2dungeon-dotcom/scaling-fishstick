<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>BLOXBURG 2D: ULTRA MAX EDITION</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        #ui {
            position: absolute; top: 20px; left: 20px;
            background: rgba(0, 0, 0, 0.85); padding: 25px;
            border-radius: 20px; border: 3px solid #3498db;
            color: #fff; pointer-events: none; z-index: 100;
            box-shadow: 0 0 20px rgba(52, 152, 219, 0.5);
        }
        .stat-bar { width: 200px; height: 10px; background: #444; border-radius: 5px; margin: 5px 0; overflow: hidden; }
        #hp-fill { height: 100%; background: #e74c3c; width: 100%; transition: 0.3s; }
        #energy-fill { height: 100%; background: #f1c40f; width: 100%; }
        .stat-val { font-size: 18px; font-weight: bold; text-shadow: 2px 2px #000; }
        #event-msg { color: #00ff00; font-weight: bold; text-transform: uppercase; animation: blink 1s infinite; }
        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }
        #win-screen {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255, 215, 0, 0.3); backdrop-filter: blur(10px);
            z-index: 1000; justify-content: center; align-items: center;
            font-size: 80px; color: #fff; text-shadow: 0 0 30px #000;
        }
    </style>
</head>
<body>

<div id="ui">
    <div class="stat-val" id="moneyLabel">💰 БАЛАНС: $500</div>
    <div class="stat-val" id="lvlLabel">🌟 УРОВЕНЬ: 1 (XP: 0/100)</div>
    <div style="margin-top:10px;">Здоровье:</div>
    <div class="stat-bar"><div id="hp-fill"></div></div>
    <div>Энергия:</div>
    <div class="stat-bar"><div id="energy-fill"></div></div>
    <div id="weaponLabel" style="color:#bdc3c7; margin-top:10px;">🔫 ОРУЖИЕ: КУЛАКИ</div>
    <div id="itemsLabel" style="color:#3498db;">🏠 МЕБЕЛЬ: 0 / 25</div>
    <div id="event-msg">СОБЫТИЕ: ШТИЛЬ</div>
</div>

<div id="win-screen">ГОРОД ПОКОРЕН!</div>
<canvas id="gameCanvas"></canvas>

<script>
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");

// --- КОНФИГУРАЦИЯ ---
const WORLD_SIZE = 4000;
const furniturePrices = Array.from({length: 25}, (_, i) => (i + 1) * 250);
const colors = { grass: "#1b5e20", road: "#2c3e50", house: "#5d4037", shop: "#455a64", forest: "#004d40", work: "#ff6f00" };

let s = {
    loc: "street", money: 1000, xp: 0, lvl: 1, items: 0,
    hp: 100, energy: 100,
    weapon: { name: "Кулаки", dmg: 10, range: 60, color: "#fff" },
    hasPackage: false, multiplier: 1, weather: "sun"
};

let p = { x: 2000, y: 2000, vx: 0, vy: 0, size: 35, rot: 0 };
let cam = { x: 2000, y: 2000 };
let enemies = [];
let particles = [];

const buildings = [
    {x: 1800, y: 1800, w: 300, h: 250, c: colors.house, n: "ЭЛИТНЫЙ ОСОБНЯК", t: "house"},
    {x: 2200, y: 1800, w: 250, h: 200, c: colors.shop, n: "МЕБЕЛЬНЫЙ ЦЕНТР", t: "shop_f"},
    {x: 1800, y: 2200, w: 250, h: 180, c: "#2c3e50", n: "ОРУЖЕЙНЫЙ БАРОН", t: "shop_w"},
    {x: 2200, y: 2200, w: 250, h: 180, c: colors.forest, n: "ЗОНА ОХОТЫ", t: "forest"},
    {x: 1000, y: 1000, w: 400, h: 150, c: colors.work, n: "ЦЕНТРАЛЬНЫЙ СКЛАД", t: "work"},
    {x: 3500, y: 3500, w: 200, h: 200, c: "#e74c3c", n: "ТОЧКА СДАЧИ", t: "dropoff"}
];

// --- СИСТЕМА УПРАВЛЕНИЯ ---
let keys = {};
window.onkeydown = (e) => { 
    keys[e.code] = true; 
    if(e.code === 'KeyE') handleInteraction();
    if(e.code === 'Escape') { s.loc = "street"; p.x=2000; p.y=2100; }
    if(e.code === 'Space') attack();
};
window.onkeyup = (e) => keys[e.code] = false;

function handleInteraction() {
    buildings.forEach(b => {
        let dist = Math.hypot(p.x - (b.x + b.w/2), p.y - (b.y + b.h/2));
        if (dist < 200) {
            if (b.t === "work" && !s.hasPackage) { s.hasPackage = true; createEffect(p.x, p.y, "#f1c40f"); }
            else if (b.t === "dropoff" && s.hasPackage) {
                let reward = 500 * s.multiplier * s.lvl;
                s.money += reward; s.xp += 40; s.hasPackage = false;
                createEffect(p.x, p.y, "#2ecc71");
            } else if (b.t !== "work" && b.t !== "dropoff") {
                s.loc = b.t;
                if(b.t === "forest") spawnEnemies();
                p.x = 400; p.y = 600;
            }
        }
    });
}

function spawnEnemies() {
    enemies = [];
    for(let i=0; i<5; i++) {
        enemies.push({ x: 800 + i*400, y: 550, hp: 50 + i*50, maxHp: 50 + i*50, type: i>2?"МЕДВЕДЬ":"ВОЛК", val: 200 + i*200 });
    }
}

function attack() {
    if(s.energy < 5) return;
    s.energy -= 5;
    let hit = false;
    enemies.forEach(en => {
        if(Math.abs(p.x - en.x) < s.weapon.range) {
            en.hp -= s.weapon.dmg * (1 + s.lvl*0.1);
            createEffect(en.x, en.y, "red");
            if(en.hp <= 0) { s.money += en.val; s.xp += en.val/2; en.x = -10000; }
            hit = true;
        }
    });
    if(!hit) createEffect(p.x + 50, p.y, s.weapon.color);
}

function createEffect(x, y, color) {
    for(let i=0; i<10; i++) particles.push({x, y, vx: (Math.random()-0.5)*10, vy: (Math.random()-0.5)*10, c: color, life: 20});
}

function update() {
    // XP & Level
    if(s.xp >= s.lvl * 100) { s.xp = 0; s.lvl++; s.hp = 100; createEffect(p.x, p.y, "gold"); }

    // Логика мира
    if (stateUpdate()) return;

    // Снятие энергии
    if(s.energy < 100) s.energy += 0.05;

    // Интерфейс
    document.getElementById("moneyLabel").innerText = `💰 БАЛАНС: $${Math.floor(s.money)}`;
    document.getElementById("lvlLabel").innerText = `🌟 УРОВЕНЬ: ${s.lvl} (XP: ${Math.floor(s.xp)}/${s.lvl*100})`;
    document.getElementById("hp-fill").style.width = s.hp + "%";
    document.getElementById("energy-fill").style.width = s.energy + "%";
    document.getElementById("itemsLabel").innerText = `🏠 МЕБЕЛЬ: ${s.items} / 25`;
    document.getElementById("weaponLabel").innerText = `🔫 ОРУЖИЕ: ${s.weapon.name.toUpperCase()}`;
}

function stateUpdate() {
    let speed = (s.energy > 10 ? 8 : 3);
    if(s.loc === "forest") {
        if(keys["KeyA"]) p.x -= speed;
        if(keys["KeyD"]) p.x += speed;
        if(keys["KeyW"] && p.y >= 550) p.vy = -16;
        p.vy += 0.8; p.y += p.vy;
        if(p.y > 550) { p.y = 550; p.vy = 0; }
        
        enemies.forEach(en => {
            if(en.x < -1000) return;
            en.x += (p.x > en.x ? 3 : -3);
            if(Math.hypot(p.x - en.x, p.y - en.y) < 40) {
                s.hp -= 0.5;
                if(s.hp <= 0) { s.money *= 0.8; s.hp = 100; s.loc = "street"; p.x=2000; p.y=2000; alert("ВЫ ПОПАЛИ В БОЛЬНИЦУ!"); }
            }
        });
    } else {
        if(keys["KeyW"]) p.y -= speed; if(keys["KeyS"]) p.y += speed;
        if(keys["KeyA"]) p.x -= speed; if(keys["KeyD"]) p.x += speed;
    }

    if(s.loc === "shop_f" && p.y < 200) {
        let price = furniturePrices[s.items];
        if(s.money >= price && s.items < 25) { s.money -= price; s.items++; p.y = 400; checkWin(); }
    }

    if(s.loc === "shop_w") {
        if(p.x < 200 && s.money >= 2000) { s.weapon = {name: "Магнум", dmg: 60, range: 200, color: "orange"}; s.money -= 2000; p.x=400; }
        if(p.x > 600 && s.money >= 10000) { s.weapon = {name: "Плазмоган", dmg: 250, range: 500, color: "cyan"}; s.money -= 10000; p.x=400; }
    }
}

function checkWin() {
    if(s.items >= 25) {
        let w = document.getElementById("win-screen");
        w.style.display = "flex";
        setTimeout(() => w.style.display = "none", 3000);
    }
}

function draw() {
    ctx.fillStyle = "#000"; ctx.fillRect(0,0, canvas.width, canvas.height);
    ctx.save();
    ctx.translate(canvas.width/2 - p.x, canvas.height/2 - p.y);

    if(s.loc === "street") {
        ctx.fillStyle = colors.grass; ctx.fillRect(0,0, WORLD_SIZE, WORLD_SIZE);
        // Дороги
        ctx.fillStyle = colors.road; ctx.fillRect(1900, 0, 200, WORLD_SIZE); ctx.fillRect(0, 1900, WORLD_SIZE, 200);
        // Здания с тенями
        buildings.forEach(b => {
            ctx.shadowColor = "rgba(0,0,0,0.5)"; ctx.shadowBlur = 20;
            ctx.fillStyle = b.c; ctx.beginPath(); ctx.roundRect(b.x, b.y, b.w, b.h, 20); ctx.fill();
            ctx.shadowBlur = 0; ctx.fillStyle = "#fff"; ctx.fillText(b.n, b.x, b.y - 10);
        });
    } else if(s.loc === "forest") {
        ctx.fillStyle = "#001a33"; ctx.fillRect(p.x-1000, 0, 2000, WORLD_SIZE);
        ctx.fillStyle = "#1b5e20"; ctx.fillRect(p.x-1000, 585, 2000, 500);
        enemies.forEach(en => {
            if(en.x < -1000) return;
            ctx.fillStyle = en.type === "МЕДВЕДЬ" ? "#3e2723" : "#7f8c8d";
            ctx.fillRect(en.x-25, en.y-20, 50, 40);
            // Health Bar врага
            ctx.fillStyle = "red"; ctx.fillRect(en.x-25, en.y-40, (en.hp/en.maxHp)*50, 5);
        });
    } else {
        ctx.fillStyle = "#2c3e50"; ctx.fillRect(0,0, 800, 800);
        if(s.loc === "house") {
            for(let i=0; i<s.items; i++) {
                ctx.fillStyle = `hsl(${i*15}, 70%, 50%)`; 
                ctx.fillRect(50+(i%5)*150, 100+Math.floor(i/5)*120, 100, 60);
                ctx.fillStyle = "#fff"; ctx.font = "12px Arial"; ctx.fillText("VIP ОБЪЕКТ "+(i+1), 50+(i%5)*150, 90+Math.floor(i/5)*120);
            }
        }
        ctx.fillStyle = "#e74c3c"; ctx.fillRect(350, 780, 100, 20); // Выход
    }

    // Частицы
    particles.forEach((pt, i) => {
        pt.x += pt.vx; pt.y += pt.vy; pt.life--;
        ctx.fillStyle = pt.c; ctx.fillRect(pt.x, pt.y, 4, 4);
        if(pt.life <= 0) particles.splice(i, 1);
    });

    // Игрок
    ctx.shadowBlur = 15; ctx.shadowColor = s.weapon.color;
    ctx.fillStyle = "#3498db"; ctx.beginPath(); ctx.roundRect(p.x-20, p.y-20, 40, 40, 10); ctx.fill();
    ctx.shadowBlur = 0;
    // Глаза
    ctx.fillStyle = "#fff"; ctx.fillRect(p.x-12, p.y-12, 8, 8); ctx.fillRect(p.x+4, p.y-12, 8, 8);
    if(s.hasPackage) { ctx.fillStyle = "gold"; ctx.fillRect(p.x-10, p.y-35, 20, 20); }

    ctx.restore();
    update();
    requestAnimationFrame(draw);
}

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;
draw();
</script>
</body>
</html>
