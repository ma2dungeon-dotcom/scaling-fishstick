<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CAVE-NET | Опасность во тьме</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        :root {
            --dark-stone: #0f0f0f;
            --blood-red: #660000;
            --danger-orange: #ff4500;
            --cave-gold: #ffd700;
            --text-grey: #a0a0a0;
        }

        body, html {
            margin: 0;
            padding: 0;
            background-color: var(--dark-stone);
            color: white;
            font-family: 'Courier New', Courier, monospace;
            overflow-x: hidden;
        }

        /* Эффект мерцания факела по краям */
        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            box-shadow: inset 0 0 150px rgba(0,0,0,0.9), inset 0 0 50px rgba(255,69,0,0.1);
            pointer-events: none;
            z-index: 10;
        }

        /* Навигация а-ля ВК */
        header {
            background: rgba(20, 20, 20, 0.9);
            border-bottom: 2px solid var(--blood-red);
            padding: 10px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logo { color: var(--blood-red); font-weight: bold; font-size: 24px; text-shadow: 2px 2px 5px black; }
