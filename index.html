<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ma2DUNGEON · Вход</title>
    <style>
        /* Стили, чтобы всё выглядело аккуратно */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, system-ui, sans-serif;
        }

        body {
            background: linear-gradient(145deg, #1a1e2b 0%, #2a2f3f 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Шапка (хедер) — верхняя полоса */
        .header {
            background-color: rgba(10, 14, 23, 0.85);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            padding: 0.8rem 2rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 2px solid #3c3f5e;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.6);
            position: relative;
            flex-wrap: wrap; /* на случай узких экранов */
        }

        /* Левая часть — название */
        .site-title {
            font-size: 1.9rem;
            font-weight: 800;
            letter-spacing: 2px;
            background: linear-gradient(135deg, #b886fd, #a45ee5);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-shadow: 0 0 12px #9147ff80;
            border-right: 2px solid #5f559b;
            padding-right: 20px;
            min-width: fit-content;
        }

        /* Центральная часть — имя пользователя */
        .user-name-center {
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
            background: #2d2f47;
            padding: 0.5rem 2rem;
            border-radius: 60px;
            border: 1px solid #6b5f9e;
            box-shadow: inset 0 2px 5px #0b0b15, 0 4px 15px #342b53;
            font-weight: 600;
            font-size: 1.3rem;
            color: #f2e9ff;
            letter-spacing: 0.5px;
            white-space: nowrap;
            max-width: 40%;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* Правая часть — кнопка настроек */
        .settings-btn {
            background: #262b3d;
            border: 2px solid #5a4d84;
            color: #d4c2ff;
            font-size: 1.3rem;
            padding: 0.5rem 1.5rem;
            border-radius: 40px;
            font-weight: 600;
            cursor: default; /* пока просто кнопка без действия */
            transition: 0.2s;
            box-shadow: 0 0 10px #433f6b;
            display: flex;
            align-items: center;
            gap: 8px;
            letter-spacing: 0.5px;
            backdrop-filter: blur(4px);
            margin-left: auto; /* прижимаем справа */
        }

        .settings-btn:hover {
            background: #313a57;
            border-color: #9b83e0;
            color: #f0eaff;
            box-shadow: 0 0 18px #7d63c5;
        }

        /* Основной контент (просто чтобы сайт не был пустым) */
        .content {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            color: #cbcbe0;
            padding: 2rem;
            text-align: center;
        }

        .welcome-block {
            background: rgba(18, 22, 38, 0.7);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid #57608c;
            border-radius: 48px;
            padding: 3rem 4rem;
            box-shadow: 0 25px 40px -10px black;
        }

        .welcome-block h2 {
            font-size: 2.8rem;
            background: linear-gradient(145deg, #ded5ff, #b29eff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 1rem;
        }

        .welcome-block p {
            font-size: 1.3rem;
            max-width: 600px;
            color: #b6b7d0;
        }

        .dungeon-icon {
            font-size: 4rem;
            filter: drop-shadow(0 0 16px #aa88ff);
            margin-bottom: 20px;
        }

        /* Адаптивность: на узких экранах центр не ломается */
        @media (max-width: 800px) {
            .user-name-center {
                position: static;
                transform: none;
                margin: 10px 0;
                order: 3;
                width: 100%;
                max-width: 100%;
                text-align: center;
            }
            .header {
                justify-content: space-between;
            }
            .settings-btn {
                margin-left: 0;
            }
        }
    </style>
</head>
<body>
    <header class="header">
        <!-- Название слева -->
        <div class="site-title">⚔️ Ma2DUNGEON</div>

        <!-- Сюда будет вставлено имя пользователя (центр) -->
        <div id="userNameDisplay" class="user-name-center">─── ⋆⋅ stranger ⋅⋆ ───</div>

        <!-- Кнопка настроек справа (пока неактивна, просто элемент) -->
        <div class="settings-btn" title="Настройки (скоро будут)">
            ⚙️ Настройки
        </div>
    </header>

    <main class="content">
        <div class="welcome-block">
            <div class="dungeon-icon">🗝️🏮</div>
            <h2>Подземелье ждёт</h2>
            <p>Добро пожаловать в таверну Ma2DUNGEON.<br>Твоё имя теперь знают даже стены.</p>
            <p style="margin-top: 30px; font-style: italic; color: #9f93cf;">«Имя — это ключ к легенде»</p>
        </div>
    </main>

    <script>
        (function() {
            // Ключ для хранения имени в localStorage
            const STORAGE_NAME_KEY = 'ma2dungeon_username';

            // Элемент, куда будем выводить имя (в центре хедера)
            const userNameDisplay = document.getElementById('userNameDisplay');

            /**
             * Функция запрашивает имя у пользователя через prompt
             * и возвращает введённое значение (или null, если отмена/пусто)
             */
            function askForName() {
                let newName = prompt('Добро пожаловать в Ma2DUNGEON!\nКак нам тебя называть?', 'Искатель приключений');
                
                if (newName === null) {
                    // Если нажали "Отмена" — используем нейтральное имя
                    return 'Отважный путник';
                }
                
                newName = newName.trim();
                if (newName === '') {
                    // Если ввели пустую строку — тоже даём имя по умолчанию
                    return 'Безымянный герой';
                }
                
                return newName; // возвращаем то, что ввёл пользователь
            }

            /**
             * Обновляет отображение имени в центре хедера и сохраняет в localStorage
             */
            function setUserName(name) {
                // Сохраняем в localStorage
                localStorage.setItem(STORAGE_NAME_KEY, name);
                // Показываем в центре
                if (userNameDisplay) {
                    userNameDisplay.textContent = '✨ ' + name + ' ✨';
                }
            }

            /**
             * Загружаем имя: сначала из localStorage, если нет — запрашиваем
             */
            function loadOrAskUserName() {
                let storedName = localStorage.getItem(STORAGE_NAME_KEY);
                
                if (storedName) {
                    // Если имя уже сохранено — показываем его
                    setUserName(storedName);
                } else {
                    // Если имени нет (первый заход или очистили кэш) — запрашиваем
                    const newName = askForName();
                    setUserName(newName);
                }
            }

            // Запускаем при загрузке страницы
            loadOrAskUserName();

            // Небольшой бонус: можно обновить имя двойным кликом по центру (для удобства)
            if (userNameDisplay) {
                userNameDisplay.addEventListener('dblclick', function() {
                    const newName = askForName();  // повторно используем ту же логику
                    setUserName(newName);
                });
            }

            // Альтернативный способ: если захочешь сбросить имя, открой консоль и напиши localStorage.removeItem('ma2dungeon_username')
        })();
    </script>

    <!-- Дополнительное примечание: 
         При двойном клике по центральному блоку с именем можно его изменить. 
         Настройки пока не работают, это просто элемент дизайна. -->
</body>
</html>
