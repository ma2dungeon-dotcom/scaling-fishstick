<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>2D Bloxburg Clone</title>
    <style>
        body { margin: 0; overflow: hidden; font-family: sans-serif; }
        canvas { display: block; background: #7cfc00; }
        #ui {
            position: absolute;
            top: 10px;
            left: 10px;
            background: rgba(255, 255, 255, 0.8);
            padding: 15px;
            border-radius: 10px;
            pointer-events: none;
        }
        .weather-info {
            position: absolute;
            top: 10px;
            right: 10px;
            background: rgba(0, 0, 0, 0.6);
            color: white;
            padding: 10px;
            border-radius: 5px;
        }
    </style>
</head>
<body>

<div id="ui">
    <div id="money">Деньги: $0</div>
    <div id="house">Уровень дома: 1</div>
    <div style="margin-top: 10px; font-size: 12px;">
        Управление: <b>WASD</b> или <b>Стрелки</b><br>
        Работа: Подойди к <b>Желтому кругу</b><br>
        Магазин: Подойди к <b>Серому зданию</b> (нужно $150)
    </div>
</div>

<div class="weather-info" id="weatherLabel">Погода: Солнечно</div>

<canvas id="gameCanvas"></canvas>

<script>
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

// Состояние игры
let player = { x: 100, y: 100, size: 30, speed: 5 };
let money = 0;
let houseLevel = 1;
let lastWorkTime = 0;

// Погода
const weatherTypes = [
    { name: "Солнечно", color: "#7cfc00" }, 
    { name: "Дождь", color: "#4682B4" }, 
    { name: "Снег", color: "#F0F8FF" }
];
let currentWeatherIdx = 0;

// Объекты мира
const shop = { x: canvas.width - 250, y: 100, w: 150, h: 100 };
const workZone = { x: 100, y: canvas.height - 150, r: 40 };

// Управление
let keys = {};
window.addEventListener("keydown", (e) => keys[e.code] = true);
window.addEventListener("keyup", (e) => keys[e.code] = false);

// Логика погоды (каждые 3 минуты = 180 000 мс)
setInterval(() => {
    currentWeatherIdx = (currentWeatherIdx + 1) % weatherTypes.length;
    document.getElementById("weatherLabel").innerText = "Погода: " + weatherTypes[currentWeatherIdx].name;
}, 180000); 

function update() {
    // Движение
    if (keys["KeyW"] || keys["ArrowUp"]) player.y -= player.speed;
    if (keys["KeyS"] || keys["ArrowDown"]) player.y += player.speed;
    if (keys["KeyA"] || keys["ArrowLeft"]) player.x -= player.speed;
    if (keys["KeyD"] || keys["ArrowRight"]) player.x += player.speed;

    // Проверка работы (желтая зона)
    let distWork = Math.hypot(player.x - workZone.x, player.y - workZone.y);
    if (distWork < workZone.r && Date.now() - lastWorkTime > 500) {
        money += 10;
        lastWorkTime = Date.now();
    }

    // Проверка магазина
    if (player.x > shop.x && player.x < shop.x + shop.w && player.y > shop.y && player.y < shop.y + shop.h) {
        if (money >= 150) {
            money -= 150;
            houseLevel++;
            player.x -= 50; // Отталкиваем игрока, чтобы не купил всё сразу
        }
    }

    // Обновление интерфейса
    document.getElementById("money").innerText = `Деньги: $${money}`;
    document.getElementById("house").innerText = `Уровень дома: ${houseLevel}`;
}

function draw() {
    // Фон (Погода)
    ctx.fillStyle = weatherTypes[currentWeatherIdx].color;
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    // Рисуем работу (Зона заработка)
    ctx.fillStyle = "yellow";
    ctx.beginPath();
    ctx.arc(workZone.x, workZone.y, workZone.r, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = "black";
    ctx.fillText("РАБОТА (Стой тут)", workZone.x - 40, workZone.y + 60);

    // Рисуем магазин
    ctx.fillStyle = "#808080";
    ctx.fillRect(shop.x, shop.y, shop.w, shop.h);
    ctx.fillStyle = "white";
    ctx.fillText("МАГАЗИН (Апгрейд $150)", shop.x + 10, shop.y + 50);

    // Рисуем ДОМ (растет с уровнем)
    let hSize = 60 + (houseLevel * 20);
    ctx.fillStyle = "#8B4513";
    ctx.fillRect(canvas.width/2 - hSize/2, canvas.height/2 - hSize/2, hSize, hSize);
    // Крыша
    ctx.fillStyle = "#A52A2A";
    ctx.beginPath();
    ctx.moveTo(canvas.width/2 - hSize/2, canvas.height/2 - hSize/2);
    ctx.lineTo(canvas.width/2 + hSize/2, canvas.height/2 - hSize/2);
    ctx.lineTo(canvas.width/2, canvas.height/2 - hSize);
    ctx.fill();

    // Рисуем игрока
    ctx.fillStyle = "blue";
    ctx.fillRect(player.x - player.size/2, player.y - player.size/2, player.size, player.size);

    requestAnimationFrame(() => {
        update();
        draw();
    });
}

draw();
</script>
</body>
</html>
