<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MA2Dungeon Dash Pro 🔷</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Rubik:wght@400;600;800&display=swap');
    
    * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; }
    body {
      font-family: 'Rubik', sans-serif;
      background: #1a1a2e;
      color: #fff;
      overflow: hidden; /* Чтобы не скроллилось в меню */
      height: 100vh;
    }

    /* --- UI LAYOUT --- */
    .app-container {
      display: flex;
      flex-direction: column;
      height: 100vh;
      transition: opacity 0.3s;
    }

    header {
      background: linear-gradient(90deg, #16213e, #0f3460);
      padding: 15px 30px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      box-shadow: 0 4px 15px rgba(0,0,0,0.5);
      z-index: 10;
    }

    h1 {
      font-size: 1.8rem;
      background: linear-gradient(45deg, #00d4ff, #e94560);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      font-weight: 800;
    }

    .user-panel { display: flex; gap: 15px; align-items: center; }
    .user-badge {
      background: #e94560;
      padding: 5px 15px;
      border-radius: 20px;
      font-weight: bold;    }
    
    button {
      padding: 8px 16px;
      border: none;
      border-radius: 8px;
      font-weight: 600;
      cursor: pointer;
      transition: 0.2s;
      font-family: inherit;
    }
    .btn-primary { background: #00d4ff; color: #000; }
    .btn-danger { background: #e94560; color: #fff; }
    .btn-success { background: #4cc9f0; color: #000; }
    button:hover { transform: scale(1.05); filter: brightness(1.2); }

    /* --- SCREENS --- */
    .screen { display: none; flex: 1; flex-direction: column; overflow: hidden; }
    .screen.active { display: flex; }

    /* --- LEVELS MENU (GD Style) --- */
    .levels-header { text-align: center; padding: 20px; }
    .levels-container {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 20px 0;
    }
    
    .levels-scroll {
      display: flex;
      gap: 25px;
      padding: 20px 50px;
      overflow-x: auto;
      overflow-y: hidden;
      scroll-behavior: smooth;
      height: 220px;
      align-items: center;
    }
    /* Custom Scrollbar */
    .levels-scroll::-webkit-scrollbar { height: 10px; }
    .levels-scroll::-webkit-scrollbar-thumb { background: #00d4ff; border-radius: 5px; }
    .levels-scroll::-webkit-scrollbar-track { background: #16213e; }

    .level-card {
      min-width: 160px;
      height: 160px;
      background: linear-gradient(135deg, #2a5298, #1e3c72);
      border: 4px solid #00d4ff;      border-radius: 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: 0.3s;
      position: relative;
      box-shadow: 0 0 20px rgba(0, 212, 255, 0.2);
    }
    .level-card:hover {
      transform: translateY(-10px) scale(1.05);
      box-shadow: 0 0 30px rgba(0, 212, 255, 0.6);
      background: linear-gradient(135deg, #4a69bd, #2a5298);
    }
    .level-icon {
      width: 60px;
      height: 60px;
      background: #000;
      border-radius: 10px;
      margin-bottom: 10px;
      border: 2px solid #fff;
    }
    .level-name { font-weight: bold; font-size: 1.1rem; margin-bottom: 5px; }
    .level-diff { font-size: 0.8rem; padding: 3px 10px; border-radius: 10px; background: rgba(0,0,0,0.5); }

    .diff-easy { color: #4cd964; border: 1px solid #4cd964; }
    .diff-normal { color: #ff9500; border: 1px solid #ff9500; }
    .diff-hard { color: #ff3b30; border: 1px solid #ff3b30; }
    .diff-insane { color: #e040fb; border: 1px solid #e040fb; }

    .create-level-btn {
      min-width: 160px;
      height: 160px;
      border: 4px dashed #666;
      border-radius: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      font-size: 3rem;
      color: #666;
      transition: 0.3s;
    }
    .create-level-btn:hover { border-color: #4cc9f0; color: #4cc9f0; background: rgba(76, 201, 240, 0.1); }

    /* --- EDITOR --- */
    .editor-wrap {
      display: flex;
      height: 100%;    }
    .editor-sidebar {
      width: 250px;
      background: #16213e;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 15px;
      overflow-y: auto;
      border-right: 2px solid #0f3460;
    }
    .editor-canvas-wrap {
      flex: 1;
      position: relative;
      background: #000;
    }
    .tool-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 10px;
    }
    .tool-btn {
      padding: 15px;
      background: #0f3460;
      border: 2px solid transparent;
      border-radius: 10px;
      color: white;
      cursor: pointer;
      text-align: center;
    }
    .tool-btn.active { border-color: #00d4ff; background: #1e3c72; }
    .tool-btn canvas { margin-bottom: 5px; }

    /* --- FULLSCREEN GAME --- */
    #gameOverlay {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: #000;
      z-index: 1000;
      display: none;
      flex-direction: column;
    }
    #gameOverlay.active { display: flex; }
    
    #gameCanvas {
      flex: 1;
      width: 100%;
      background: linear-gradient(to bottom, #1e3c72, #2a5298);
    }    
    .game-ui-top {
      position: absolute;
      top: 20px;
      left: 20px;
      display: flex;
      gap: 10px;
      z-index: 1001;
    }
    .game-ui-score {
      position: absolute;
      top: 20px;
      right: 20px;
      font-size: 2rem;
      font-weight: bold;
      text-shadow: 2px 2px 0 #000;
      z-index: 1001;
    }
    
    /* --- MODALS --- */
    .modal {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: rgba(0,0,0,0.8);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 2000;
    }
    .modal.active { display: flex; }
    .modal-content {
      background: #16213e;
      padding: 40px;
      border-radius: 20px;
      border: 2px solid #00d4ff;
      width: 400px;
      text-align: center;
    }
    .modal input {
      width: 100%;
      padding: 15px;
      margin: 20px 0;
      background: #0f3460;
      border: none;
      color: white;
      font-size: 1.2rem;
      border-radius: 10px;
      text-align: center;
    }
    /* --- SKINS GRID --- */
    .skins-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(80px, 1fr));
      gap: 10px;
      padding: 10px;
    }
    .skin-item {
      background: rgba(255,255,255,0.1);
      padding: 10px;
      border-radius: 10px;
      cursor: pointer;
      display: flex;
      flex-direction: column;
      align-items: center;
      border: 2px solid transparent;
    }
    .skin-item.active { border-color: #00d4ff; background: rgba(0,212,255,0.2); }
    .skin-preview { width: 40px; height: 40px; margin-bottom: 5px; }

    /* Tabs */
    .tabs { display: flex; justify-content: center; gap: 10px; padding: 10px; background: #16213e; }
    .tab { padding: 10px 20px; cursor: pointer; border-bottom: 3px solid transparent; }
    .tab.active { border-color: #00d4ff; color: #00d4ff; }
  </style>
</head>
<body>

  <!-- APP CONTAINER -->
  <div class="app-container" id="app">
    <header>
      <h1>🔷 MA2Dungeon</h1>
      <div class="user-panel" id="userPanel">
        <button onclick="openLogin()" class="btn-primary">Войти</button>
      </div>
    </header>

    <div class="tabs">
      <div class="tab active" onclick="switchTab('menu')">🏠 Уровни</div>
      <div class="tab" onclick="switchTab('editor')">✏️ Редактор</div>
      <div class="tab" onclick="switchTab('skins')">🎨 Скины</div>
    </div>

    <!-- MENU SCREEN -->
    <div id="menuScreen" class="screen active">
      <div class="levels-header">
        <h2>Выбери уровень</h2>
      </div>
      <div class="levels-container">        <div class="levels-scroll" id="levelsList">
          <!-- Levels injected here -->
          <div class="create-level-btn" onclick="openEditor()">+</div>
        </div>
      </div>
    </div>

    <!-- EDITOR SCREEN -->
    <div id="editorScreen" class="screen">
      <div class="editor-wrap">
        <div class="editor-sidebar">
          <h3>Объекты</h3>
          <div class="tool-grid">
            <div class="tool-btn active" onclick="setTool('block')">
              <canvas id="icon-block" width="30" height="30"></canvas>
              <div>Блок</div>
            </div>
            <div class="tool-btn" onclick="setTool('spike')">
              <canvas id="icon-spike" width="30" height="30"></canvas>
              <div>Шип</div>
            </div>
            <div class="tool-btn" onclick="setTool('coin')">
              <canvas id="icon-coin" width="30" height="30"></canvas>
              <div>Монета</div>
            </div>
            <div class="tool-btn" onclick="setTool('portal')">
              <canvas id="icon-portal" width="30" height="30"></canvas>
              <div>Портал</div>
            </div>
            <div class="tool-btn" onclick="setTool('erase')">
              <div style="font-size:24px">🗑️</div>
              <div>Стереть</div>
            </div>
          </div>
          
          <hr style="border-color:#333">
          
          <label>Название:</label>
          <input type="text" id="levelNameInput" placeholder="Мой уровень" value="New Level">
          
          <label>Сложность:</label>
          <select id="levelDiffInput" style="padding:10px; border-radius:5px; background:#0f3460; color:white; border:none;">
            <option value="easy">Лёгкая</option>
            <option value="normal" selected>Нормальная</option>
            <option value="hard">Сложная</option>
            <option value="insane">Безумная</option>
          </select>

          <div style="margin-top:auto; display:flex; flex-direction:column; gap:10px;">
            <button onclick="saveLevelFromEditor()" class="btn-success">💾 Сохранить</button>            <button onclick="switchTab('menu')" class="btn-primary">🏠 В меню</button>
          </div>
        </div>
        <div class="editor-canvas-wrap">
          <canvas id="editorCanvas"></canvas>
        </div>
      </div>
    </div>

    <!-- SKINS SCREEN -->
    <div id="skinsScreen" class="screen">
      <div style="text-align:center; padding:20px;">
        <h2>Выбери скин</h2>
        <p style="color:#aaa; margin-bottom:20px;">Нажми, чтобы выбрать</p>
      </div>
      <div class="skins-grid" id="skinsGrid" style="max-width:800px; margin:0 auto;"></div>
    </div>
  </div>

  <!-- FULLSCREEN GAME OVERLAY -->
  <div id="gameOverlay">
    <div class="game-ui-top">
      <button onclick="exitGame()" class="btn-danger"> Меню</button>
      <button onclick="restartGame()" class="btn-primary">🔄 Рестарт</button>
    </div>
    <div class="game-ui-score" id="scoreDisplay">0%</div>
    <canvas id="gameCanvas"></canvas>
  </div>

  <!-- LOGIN MODAL -->
  <div class="modal" id="loginModal">
    <div class="modal-content">
      <h2>👤 Вход в аккаунт</h2>
      <p>Данные сохраняются в этом браузере</p>
      <input type="text" id="usernameInput" placeholder="Никнейм">
      <button onclick="login()" class="btn-success" style="width:100%; font-size:1.2rem;">Войти / Создать</button>
      <button onclick="closeLogin()" style="margin-top:10px; background:transparent; color:#888;">Отмена</button>
    </div>
  </div>

  <script>
    // ==================== CORE CONFIG ====================
    const GRID_SIZE = 40;
    const SKINS = [
      { id: 'blue', color: '#00d4ff', type: 'square' },
      { id: 'red', color: '#ff416c', type: 'square' },
      { id: 'green', color: '#00ff88', type: 'square' },
      { id: 'yellow', color: '#ffd700', type: 'square' },
      { id: 'purple', color: '#9d4edd', type: 'square' },
      { id: 'orange', color: '#ff9500', type: 'square' },      { id: 'white', color: '#ffffff', type: 'square' },
      { id: 'black', color: '#333333', type: 'square' },
      // Special shapes
      { id: 'blue-diamond', color: '#00d4ff', type: 'diamond' },
      { id: 'red-diamond', color: '#ff416c', type: 'diamond' },
      { id: 'blue-circle', color: '#00d4ff', type: 'circle' },
      { id: 'green-circle', color: '#00ff88', type: 'circle' },
      { id: 'yellow-circle', color: '#ffd700', type: 'circle' },
      { id: 'spiky-red', color: '#ff416c', type: 'spiky' },
      { id: 'spiky-blue', color: '#00d4ff', type: 'spiky' }
    ];

    // ==================== STATE ====================
    let state = {
      user: localStorage.getItem('ma2_user') || null,
      skin: localStorage.getItem('ma2_skin') || 'blue',
      levels: []
    };

    let game = {
      active: false,
      score: 0,
      player: {},
      obstacles: [],
      speed: 6,
      animationId: null,
      levelData: null
    };

    let editor = {
      objects: [],
      tool: 'block',
      canvas: null,
      ctx: null,
      isDrawing: false,
      groundY: 0
    };

    // ==================== INITIALIZATION ====================
    window.onload = () => {
      initIcons();
      renderSkins();
      
      if (state.user) {
        login(state.user);
      } else {
        openLogin();
      }
    };
    // ==================== DRAWING ENGINE (NO EMOJIS) ====================
    function drawShape(ctx, type, x, y, size, color) {
      ctx.fillStyle = color;
      ctx.strokeStyle = 'white';
      ctx.lineWidth = 2;
      
      const s = size || 40;
      const half = s / 2;
      
      ctx.save();
      ctx.translate(x + half, y + half);

      if (type === 'square' || type === 'block') {
        ctx.fillRect(-half, -half, s, s);
        ctx.strokeRect(-half, -half, s, s);
        // Inner detail
        ctx.fillStyle = 'rgba(0,0,0,0.3)';
        ctx.fillRect(-half + 5, -half + 5, s - 10, s - 10);
      } 
      else if (type === 'spike') {
        ctx.beginPath();
        ctx.moveTo(0, -half);
        ctx.lineTo(half, half);
        ctx.lineTo(-half, half);
        ctx.closePath();
        ctx.fill();
        ctx.stroke();
      } 
      else if (type === 'coin') {
        ctx.beginPath();
        ctx.arc(0, 0, half - 4, 0, Math.PI * 2);
        ctx.fill();
        ctx.stroke();
        ctx.fillStyle = 'rgba(0,0,0,0.3)';
        ctx.beginPath();
        ctx.arc(0, 0, half - 10, 0, Math.PI * 2);
        ctx.fill();
      }
      else if (type === 'portal') {
        ctx.beginPath();
        ctx.arc(0, 0, half - 2, 0, Math.PI * 2);
        ctx.strokeStyle = '#00ffff';
        ctx.lineWidth = 4;
        ctx.stroke();
        ctx.beginPath();
        ctx.arc(0, 0, half - 8, 0, Math.PI * 2);
        ctx.fillStyle = 'rgba(0,255,255,0.5)';
        ctx.fill();
      }
      else if (type === 'diamond') {        ctx.rotate(Math.PI / 4);
        ctx.fillRect(-half * 0.7, -half * 0.7, s * 0.7, s * 0.7);
        ctx.strokeRect(-half * 0.7, -half * 0.7, s * 0.7, s * 0.7);
      }
      else if (type === 'circle') {
        ctx.beginPath();
        ctx.arc(0, 0, half, 0, Math.PI * 2);
        ctx.fill();
        ctx.stroke();
      }
      else if (type === 'spiky') {
        ctx.beginPath();
        for(let i=0; i<8; i++) {
          ctx.rotate(Math.PI/4);
          ctx.lineTo(0, -half);
          ctx.lineTo(half/3, -half/3);
        }
        ctx.closePath();
        ctx.fill();
        ctx.stroke();
      }

      ctx.restore();
    }

    function initIcons() {
      // Draw icons for tools
      ['block', 'spike', 'coin', 'portal'].forEach(type => {
        const cvs = document.getElementById(`icon-${type}`);
        if(cvs) {
          const c = cvs.getContext('2d');
          c.scale(0.75, 0.75); // Scale down for small icons
          drawShape(c, type, 0, 0, 40, '#fff');
        }
      });
    }

    // ==================== UI MANAGEMENT ====================
    function switchTab(tab) {
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
      
      if(tab === 'menu') {
        document.querySelector('.tab:nth-child(1)').classList.add('active');
        document.getElementById('menuScreen').classList.add('active');
        renderLevels();
      } else if (tab === 'editor') {
        document.querySelector('.tab:nth-child(2)').classList.add('active');
        document.getElementById('editorScreen').classList.add('active');
        initEditor();      } else if (tab === 'skins') {
        document.querySelector('.tab:nth-child(3)').classList.add('active');
        document.getElementById('skinsScreen').classList.add('active');
      }
    }

    function renderLevels() {
      const list = document.getElementById('levelsList');
      // Keep the "+" button at the end
      const createBtn = list.querySelector('.create-level-btn');
      list.innerHTML = '';
      
      const userLevels = state.levels.filter(l => l.author === state.user);
      
      userLevels.forEach(lvl => {
        const card = document.createElement('div');
        card.className = 'level-card';
        card.onclick = () => playLevel(lvl);
        
        // Difficulty color
        let diffClass = 'diff-normal';
        let diffText = 'Норм';
        if(lvl.difficulty === 'easy') { diffClass = 'diff-easy'; diffText = 'Легко'; }
        if(lvl.difficulty === 'hard') { diffClass = 'diff-hard'; diffText = 'Сложно'; }
        if(lvl.difficulty === 'insane') { diffClass = 'diff-insane'; diffText = 'Безумие'; }
        
        card.innerHTML = `
          <div class="level-icon"></div>
          <div class="level-name">${lvl.name}</div>
          <div class="level-diff ${diffClass}">${diffText}</div>
        `;
        
        // Draw mini preview
        const iconCanvas = card.querySelector('.level-icon');
        const ctx = document.createElement('canvas').getContext('2d');
        // We can't easily append canvas context here, simpler to just use CSS or a tiny canvas
        const miniCanvas = document.createElement('canvas');
        miniCanvas.width = 60; miniCanvas.height = 60;
        miniCanvas.style.width = '60px'; miniCanvas.style.height = '60px';
        miniCanvas.style.background = '#000';
        miniCanvas.style.borderRadius = '8px';
        // Just draw a random shape for preview
        const mCtx = miniCanvas.getContext('2d');
        drawShape(mCtx, 'square', 10, 10, 40, '#00d4ff');
        card.replaceChild(miniCanvas, card.querySelector('.level-icon'));
        
        list.appendChild(card);
      });
      
      list.appendChild(createBtn);    }

    function renderSkins() {
      const grid = document.getElementById('skinsGrid');
      grid.innerHTML = '';
      SKINS.forEach(skin => {
        const el = document.createElement('div');
        el.className = `skin-item ${state.skin === skin.id ? 'active' : ''}`;
        el.onclick = () => {
          state.skin = skin.id;
          localStorage.setItem('ma2_skin', skin.id);
          renderSkins();
        };
        
        const cvs = document.createElement('canvas');
        cvs.className = 'skin-preview';
        cvs.width = 40; cvs.height = 40;
        const ctx = cvs.getContext('2d');
        drawShape(ctx, skin.type, 0, 0, 40, skin.color);
        
        el.appendChild(cvs);
        el.innerHTML += `<div style="font-size:0.8rem; margin-top:5px">${skin.id}</div>`;
        grid.appendChild(el);
      });
    }

    // ==================== ACCOUNTS ====================
    function openLogin() { document.getElementById('loginModal').classList.add('active'); }
    function closeLogin() { document.getElementById('loginModal').classList.remove('active'); }
    
    function login(forceUser) {
      const name = forceUser || document.getElementById('usernameInput').value.trim();
      if(!name) return;
      
      state.user = name;
      localStorage.setItem('ma2_user', name);
      
      // Load levels
      const savedLevels = localStorage.getItem('ma2_levels_' + name);
      state.levels = savedLevels ? JSON.parse(savedLevels) : [];
      
      closeLogin();
      updateUserUI();
      renderLevels();
    }
    
    function updateUserUI() {
      document.getElementById('userPanel').innerHTML = `
        <span class="user-badge">👤 ${state.user}</span>
        <button onclick="logout()" class="btn-danger" style="font-size:0.8rem">Выйти</button>      `;
    }
    
    function logout() {
      localStorage.removeItem('ma2_user');
      location.reload();
    }

    // ==================== EDITOR LOGIC ====================
    function openEditor() {
      if(!state.user) { openLogin(); return; }
      editor.objects = [];
      document.getElementById('levelNameInput').value = 'New Level';
      switchTab('editor');
    }

    function initEditor() {
      const canvas = document.getElementById('editorCanvas');
      const wrap = canvas.parentElement;
      canvas.width = wrap.clientWidth;
      canvas.height = wrap.clientHeight;
      
      editor.canvas = canvas;
      editor.ctx = canvas.getContext('2d');
      editor.groundY = canvas.height - GRID_SIZE * 2; // Ground is 2 blocks high
      
      drawEditor();
      
      // Mouse Events
      canvas.onmousedown = (e) => { editor.isDrawing = true; handleEditorClick(e); };
      canvas.onmousemove = (e) => { if(editor.isDrawing) handleEditorClick(e); };
      canvas.onmouseup = () => editor.isDrawing = false;
      canvas.onmouseleave = () => editor.isDrawing = false;
    }

    function setTool(t) {
      editor.tool = t;
      document.querySelectorAll('.tool-btn').forEach(b => b.classList.remove('active'));
      event.currentTarget.classList.add('active');
    }

    function handleEditorClick(e) {
      const rect = editor.canvas.getBoundingClientRect();
      const x = Math.floor((e.clientX - rect.left) / GRID_SIZE) * GRID_SIZE;
      const y = Math.floor((e.clientY - rect.top) / GRID_SIZE) * GRID_SIZE;
      
      if (editor.tool === 'erase') {
        editor.objects = editor.objects.filter(o => o.x !== x || o.y !== y);
      } else {
        // Remove existing at this spot        editor.objects = editor.objects.filter(o => o.x !== x || o.y !== y);
        // Add new
        editor.objects.push({ x, y, type: editor.tool });
      }
      drawEditor();
    }

    function drawEditor() {
      const ctx = editor.ctx;
      const w = editor.canvas.width;
      const h = editor.canvas.height;
      const gY = editor.groundY;
      
      // BG
      ctx.fillStyle = '#1a1a2e';
      ctx.fillRect(0, 0, w, h);
      
      // Grid
      ctx.strokeStyle = 'rgba(255,255,255,0.05)';
      ctx.lineWidth = 1;
      for(let x=0; x<w; x+=GRID_SIZE) { ctx.beginPath(); ctx.moveTo(x,0); ctx.lineTo(x,h); ctx.stroke(); }
      for(let y=0; y<h; y+=GRID_SIZE) { ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(w,y); ctx.stroke(); }
      
      // Ground
      ctx.fillStyle = '#0f3460';
      ctx.fillRect(0, gY, w, h - gY);
      ctx.fillStyle = '#16213e'; // Ground detail
      for(let x=0; x<w; x+=GRID_SIZE) {
        ctx.fillRect(x + 5, gY + 5, GRID_SIZE - 10, GRID_SIZE - 10);
      }
      
      // Objects
      editor.objects.forEach(obj => {
        drawShape(ctx, obj.type, obj.x, obj.y, GRID_SIZE, getObjColor(obj.type));
      });
      
      // Ground Line
      ctx.strokeStyle = '#00d4ff';
      ctx.lineWidth = 2;
      ctx.beginPath(); ctx.moveTo(0, gY); ctx.lineTo(w, gY); ctx.stroke();
    }

    function getObjColor(type) {
      if(type === 'block') return '#4cc9f0';
      if(type === 'spike') return '#ff416c';
      if(type === 'coin') return '#ffd700';
      if(type === 'portal') return '#e040fb';
      return '#fff';
    }
    function saveLevelFromEditor() {
      if(!state.user) return;
      
      const name = document.getElementById('levelNameInput').value || 'Level';
      const diff = document.getElementById('levelDiffInput').value;
      
      // Check if updating existing
      const existingIdx = state.levels.findIndex(l => l.name === name && l.author === state.user);
      
      const lvlData = {
        id: existingIdx >= 0 ? state.levels[existingIdx].id : Date.now(),
        name: name,
        difficulty: diff,
        author: state.user,
        objects: [...editor.objects],
        length: editor.objects.length // Simplified length
      };
      
      if(existingIdx >= 0) {
        state.levels[existingIdx] = lvlData;
      } else {
        state.levels.push(lvlData);
      }
      
      localStorage.setItem('ma2_levels_' + state.user, JSON.stringify(state.levels));
      alert('Уровень сохранен!');
      switchTab('menu');
    }

    // ==================== GAME ENGINE ====================
    function playLevel(levelData) {
      game.levelData = levelData;
      game.active = true;
      game.score = 0;
      game.speed = 6; // Base speed
      game.obstacles = [...levelData.objects]; // Copy objects
      game.player = { x: 100, y: 0, dy: 0, grounded: false, rotation: 0 };
      
      document.getElementById('gameOverlay').classList.add('active');
      resizeGameCanvas();
      
      // Position player on ground
      const gY = gameCanvas.height - GRID_SIZE * 2;
      game.player.y = gY - GRID_SIZE;
      
      // Adjust objects relative to new canvas height
      const offset = gameCanvas.height - editor.canvas.height; // Approximate offset
      // In a real app we'd need to handle resolution scaling, 
      // for now we assume 100% height means we re-calculate Y from bottom
            const groundY = gameCanvas.height - GRID_SIZE * 2;
      game.obstacles.forEach(o => {
        // Editor objects are absolute Y. 
        // If canvas resized, we need to ensure ground matches.
        // Simple fix: Re-calculate Y based on distance from bottom of editor canvas
        const distFromBottom = editor.canvas.height - o.y;
        o.y = gameCanvas.height - distFromBottom;
      });
      
      gameLoop();
    }

    function restartGame() {
      game.active = false;
      cancelAnimationFrame(game.animationId);
      playLevel(game.levelData);
    }

    function exitGame() {
      game.active = false;
      cancelAnimationFrame(game.animationId);
      document.getElementById('gameOverlay').classList.remove('active');
    }

    function resizeGameCanvas() {
      const canvas = document.getElementById('gameCanvas');
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    }

    const gameCanvas = document.getElementById('gameCanvas');
    window.addEventListener('resize', () => {
      if(game.active) resizeGameCanvas();
    });

    // Input
    window.addEventListener('keydown', (e) => {
      if((e.code === 'Space' || e.code === 'ArrowUp') && game.active) jump();
    });
    window.addEventListener('mousedown', (e) => {
      if(game.active && e.target.id === 'gameCanvas') jump();
    });

    function jump() {
      if(game.player.grounded) {
        game.player.dy = -13; // Jump force
        game.player.grounded = false;
      }
    }
    function gameLoop() {
      if(!game.active) return;
      
      const ctx = gameCanvas.getContext('2d');
      const w = gameCanvas.width;
      const h = gameCanvas.height;
      const groundY = h - GRID_SIZE * 2;
      
      // Logic
      game.player.dy += 0.8; // Gravity
      game.player.y += game.player.dy;
      
      // Rotation
      if(!game.player.grounded) game.player.rotation += 0.1;
      else game.player.rotation = Math.round(game.player.rotation / (Math.PI/2)) * (Math.PI/2);
      
      // Ground collision
      if(game.player.y > groundY - GRID_SIZE) {
        game.player.y = groundY - GRID_SIZE;
        game.player.dy = 0;
        game.player.grounded = true;
      }
      
      // Move objects
      game.speed += 0.001; // Acceleration
      let activeObstacles = [];
      let passed = true;
      
      game.obstacles.forEach(obj => {
        obj.x -= game.speed;
        
        // Collision check
        // Simple AABB
        const px = game.player.x + 10; // hitbox padding
        const py = game.player.y + 10;
        const pw = GRID_SIZE - 20;
        const ph = GRID_SIZE - 20;
        
        const ox = obj.x + 5;
        const oy = obj.y + 5;
        const ow = GRID_SIZE - 10;
        const oh = GRID_SIZE - 10;
        
        if(px < ox + ow && px + pw > ox && py < oy + oh && py + ph > oy) {
           if(obj.type === 'spike' || obj.type === 'block') {
             // Crash
             drawDeath(ctx);
             return;
           }
        }        
        if(obj.x > -50) activeObstacles.push(obj);
        else passed = false; // Just tracking
      });
      
      game.obstacles = activeObstacles;
      
      // Score calculation based on objects passed
      // (Simplified logic)
      
      // Draw
      // Background
      ctx.fillStyle = '#1a1a2e';
      ctx.fillRect(0, 0, w, h);
      
      // Parallax BG lines
      ctx.strokeStyle = 'rgba(255,255,255,0.1)';
      ctx.lineWidth = 2;
      for(let i=0; i<10; i++) {
        let y = (i * 100 + Date.now() * 0.05 * game.speed) % h;
        ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(w, y); ctx.stroke();
      }
      
      // Ground
      ctx.fillStyle = '#0f3460';
      ctx.fillRect(0, groundY, w, h - groundY);
      ctx.fillStyle = '#16213e';
      for(let x=0; x<w; x+=GRID_SIZE) {
        let drawX = x - (Date.now() * 0.2 * game.speed) % GRID_SIZE;
        ctx.fillRect(drawX + 5, groundY + 5, GRID_SIZE - 10, GRID_SIZE - 10);
      }
      
      // Obstacles
      game.obstacles.forEach(obj => {
        drawShape(ctx, obj.type, obj.x, obj.y, GRID_SIZE, getObjColor(obj.type));
      });
      
      // Player
      const skin = SKINS.find(s => s.id === state.skin) || SKINS[0];
      ctx.save();
      ctx.translate(game.player.x + GRID_SIZE/2, game.player.y + GRID_SIZE/2);
      ctx.rotate(game.player.rotation);
      // Temporary override center for drawShape
      drawShape(ctx, skin.type, -GRID_SIZE/2, -GRID_SIZE/2, GRID_SIZE, skin.color);
      ctx.restore();
      
      // UI Update
      // Calculate progress roughly
      let progress = Math.min(100, Math.floor(game.levelData.objects.length > 0 ? (game.levelData.objects[0].x < 0 ? 100 : 50) : 0));
      // Better progress: based on time or total objects      // For this simple version:
      let totalDist = game.levelData.objects.reduce((min, o) => Math.min(min, o.x), 99999);
      // This is hacky. Let's just do score based on survival.
      // Actually let's just show "Attempt X" style
      document.getElementById('scoreDisplay').innerText = Math.floor(Date.now() / 100) + "%"; 
      
      game.animationId = requestAnimationFrame(gameLoop);
    }
    
    function drawDeath(ctx) {
      game.active = false;
      ctx.fillStyle = 'rgba(255, 0, 0, 0.5)';
      ctx.fillRect(0, 0, ctx.canvas.width, ctx.canvas.height);
      ctx.fillStyle = 'white';
      ctx.font = '50px Rubik';
      ctx.textAlign = 'center';
      ctx.fillText("CRASH", ctx.canvas.width/2, ctx.canvas.height/2);
      
      setTimeout(() => {
        if(confirm("Попытка провалена! Заново?")) restartGame();
        else exitGame();
      }, 100);
    }

  </script>
</body>
