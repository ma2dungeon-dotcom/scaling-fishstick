<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Murder Mystery 2D</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #1a1a2e; overflow: hidden; font-family: 'Segoe UI', Arial, sans-serif; }
canvas { display: block; }
#ui-overlay {
    position: absolute; top: 0; left: 0; width: 100%; height: 100%;
    pointer-events: none; z-index: 10;
}
#ui-overlay > * { pointer-events: auto; }
#skin-panel {
    position: absolute; top: 10px; right: 10px;
    background: rgba(0,0,0,0.75); border: 2px solid #e94560;
    border-radius: 12px; padding: 15px; color: white;
    min-width: 200px; display: none;
}
#skin-panel h3 { text-align: center; margin-bottom: 10px; color: #e94560; }
.skin-option {
    display: flex; align-items: center; gap: 10px;
    padding: 8px; margin: 5px 0; border-radius: 8px;
    cursor: pointer; transition: 0.2s;
    border: 2px solid transparent;
}
.skin-option:hover { background: rgba(233,69,96,0.3); }
.skin-option.selected { border-color: #e94560; background: rgba(233,69,96,0.2); }
.skin-preview { width: 40px; height: 40px; border-radius: 8px; }
#role-display {
    position: absolute; top: 10px; left: 50%; transform: translateX(-50%);
    background: rgba(0,0,0,0.8); border-radius: 12px; padding: 12px 24px;
    color: white; font-size: 20px; font-weight: bold; display: none;
    border: 2px solid;
}
#start-btn {
    position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%);
    background: linear-gradient(135deg, #e94560, #c23152);
    color: white; border: none; padding: 15px 50px; font-size: 22px;
    border-radius: 30px; cursor: pointer; font-weight: bold;
    box-shadow: 0 4px 20px rgba(233,69,96,0.5);
    transition: 0.3s; display: none;
}
#start-btn:hover { transform: translateX(-50%) scale(1.05); box-shadow: 0 6px 30px rgba(233,69,96,0.7); }
#game-hud {
    position: absolute; bottom: 10px; left: 50%; transform: translateX(-50%);
    background: rgba(0,0,0,0.7); border-radius: 10px; padding: 10px 20px;
    color: white; font-size: 14px; display: none;
    border: 1px solid rgba(255,255,255,0.2);
}
#round-result {
    position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%);
    background: rgba(0,0,0,0.9); border-radius: 20px; padding: 40px 60px;
    color: white; text-align: center; display: none;
    border: 3px solid;
}
#round-result h1 { font-size: 48px; margin-bottom: 10px; }
#round-result p { font-size: 18px; color: #aaa; }
#round-result button {
    margin-top: 20px; background: #e94560; color: white; border: none;
    padding: 12px 40px; font-size: 18px; border-radius: 25px; cursor: pointer;
}
#instructions {
    position: absolute; bottom: 60px; left: 50%; transform: translateX(-50%);
    background: rgba(0,0,0,0.7); border-radius: 10px; padding: 10px 20px;
    color: #aaa; font-size: 13px; display: none; text-align: center;
}
#kill-cooldown {
    position: absolute; bottom: 50px; right: 20px;
    background: rgba(0,0,0,0.8); border-radius: 10px; padding: 10px 15px;
    color: white; font-size: 14px; display: none;
    border: 2px solid #e94560;
}
#alive-count {
    position: absolute; top: 10px; left: 10px;
    background: rgba(0,0,0,0.7); border-radius: 10px; padding: 10px 15px;
    color: white; font-size: 14px; display: none;
    border: 1px solid rgba(255,255,255,0.2);
}
</style>
</head>
<body>

    <div id="game-hud"></div>

        <button onclick="backToLobby()">В Лобби</button>
    </div>
    <div id="instructions"></div>
    <div id="kill-cooldown"></div>
    <div id="alive-count"></div>

// ============ SKIN PANEL ============
function buildSkinPanel() {
    const list = document.getElementById('skin-list');
    list.innerHTML = '';
    SKINS.forEach(skin => {
        const div = document.createElement('div');
        div.className = 'skin-option' + (skin.id === selectedSkin ? ' selected' : '');
        div.innerHTML = `
            <div class="skin-preview" style="background:${skin.bg}; display:flex; align-items:center; justify-content:center; font-size:20px;">${skin.tip}</div>
            <div>
                <div style="font-weight:bold; color:${skin.color}">${skin.name}</div>
                <div style="font-size:11px; color:#aaa;">${skin.desc}</div>
            </div>
        `;
        div.onclick = () => {
            selectedSkin = skin.id;
            buildSkinPanel();
        };
        list.appendChild(div);
    });
}

// ============ INIT ============
function initLobby() {
    gameState = 'lobby';
    player.x = LOBBY_MAP.spawnX;
    player.y = LOBBY_MAP.spawnY;
    player.alive = true;
    player.role = 'innocent';
    bots = [];
    for (let i = 0; i < 6; i++) {
        bots.push(createBot('lobby'));
    }
    document.getElementById('skin-panel').style.display = 'block';
    document.getElementById('start-btn').style.display = 'block';
    document.getElementById('role-display').style.display = 'none';
    document.getElementById('game-hud').style.display = 'none';
    document.getElementById('round-result').style.display = 'none';
    document.getElementById('instructions').style.display = 'block';
    document.getElementById('instructions').innerHTML = 'WASD — движение | Мышь — камера | Выбери скин ножа';
    document.getElementById('kill-cooldown').style.display = 'none';
    document.getElementById('alive-count').style.display = 'none';
    buildSkinPanel();
}

function createBot(map) {
    const names = ['Alex', 'Max', 'Luna', 'Storm', 'Blaze', 'Nova', 'Shadow', 'Echo', 'Raven', 'Pixel'];
    const colors = ['#44aaff', '#ff6644', '#44ff88', '#ff44cc', '#ffcc44', '#8844ff', '#44ffcc', '#ff8844', '#cc44ff', '#44ccff'];
    const idx = Math.floor(Math.random() * names.length);
    if (map === 'lobby') {
        return {
            x: 200 + Math.random() * 500,
            y: 200 + Math.random() * 300,
            speed: 1 + Math.random() * 1.5,
            size: 16,
            name: names[idx],
            color: colors[idx],
            role: 'innocent',
            alive: true,
            targetX: 0,
            targetY: 0,
            moveTimer: 0,
            isBot: true,
            killCooldown: 0,
            shootingCooldown: 0,
        };
    }
    return {
        x: GAME_MAP.spawnX + (Math.random() - 0.5) * 600,
        y: GAME_MAP.spawnY + (Math.random() - 0.5) * 400,
        speed: 2 + Math.random() * 1,
        size: 16,
        name: names[idx],
        color: colors[idx],
        role: 'innocent',
        alive: true,
        targetX: 0,
        targetY: 0,
        moveTimer: 0,
        isBot: true,
        killCooldown: 0,
        shootingCooldown: 0,
    };
}

// ============ START GAME ============
function startGame() {
    gameState = 'countdown';
    countdownTimer = 3;
    document.getElementById('skin-panel').style.display = 'none';
    document.getElementById('start-btn').style.display = 'none';
    document.getElementById('instructions').style.display = 'none';

    // Setup game map
    player.x = GAME_MAP.spawnX;
    player.y = GAME_MAP.spawnY;

    // Create bots
    bots = [];
    for (let i = 0; i < 9; i++) {
        bots.push(createBot('game'));
    }

    // Assign roles
    const allPlayers = [player, ...bots];
    // 1 murderer, 1 sheriff, rest innocent
    const murderIdx = Math.floor(Math.random() * allPlayers.length);
    let sheriffIdx;
    do { sheriffIdx = Math.floor(Math.random() * allPlayers.length); } while (sheriffIdx === murderIdx);

    allPlayers.forEach((p, i) => {
        if (i === murderIdx) p.role = 'murder';
        else if (i === sheriffIdx) p.role = 'sheriff';
        else p.role = 'innocent';
        p.alive = true;
        p.killCooldown = 0;
        p.shootingCooldown = 0;
    });

    // Show role
    const roleDisplay = document.getElementById('role-display');
    roleDisplay.style.display = 'block';
    if (player.role === 'murder') {
        roleDisplay.textContent = '🗡️ MURDER — Убей всех!';
        roleDisplay.style.borderColor = '#ff0044';
        roleDisplay.style.color = '#ff0044';
    } else if (player.role === 'sheriff') {
        roleDisplay.textContent = '🔫 SHERIFF — Найди убийцу!';
        roleDisplay.style.borderColor = '#44aaff';
        roleDisplay.style.color = '#44aaff';
    } else {
        roleDisplay.textContent = '😰 INNOCENT — Выживи!';
        roleDisplay.style.borderColor = '#44ff88';
        roleDisplay.style.color = '#44ff88';
    }

    setTimeout(() => {
        gameState = 'playing';
        roundTimer = 0;
        document.getElementById('instructions').style.display = 'block';
        if (player.role === 'murder') {
            document.getElementById('instructions').innerHTML = 'WASD — движение | ЛКМ — убить (рядом с игроком) | Не попадись шерифу!';
            document.getElementById('kill-cooldown').style.display = 'block';
        } else if (player.role === 'sheriff') {
            document.getElementById('instructions').innerHTML = 'WASD — движение | ЛКМ — стрелять | Осторожно: убьёшь невиновного — проиграешь!';
            document.getElementById('kill-cooldown').style.display = 'block';
        } else {
            document.getElementById('instructions').innerHTML = 'WASD — движение | Беги и прячься! Найди убийцу!';
            document.getElementById('kill-cooldown').style.display = 'none';
        }
        document.getElementById('alive-count').style.display = 'block';
    }, 3500);
}

// ============ INPUT ============
window.addEventListener('keydown', e => keys[e.key.toLowerCase()] = true);
window.addEventListener('keyup', e => keys[e.key.toLowerCase()] = false);
window.addEventListener('mousemove', e => { mouse.x = e.clientX; mouse.y = e.clientY; });
window.addEventListener('mousedown', e => {
    mouse.clicked = true;
    if (gameState === 'playing' && player.alive) {
        if (player.role === 'murder' && player.killCooldown <= 0) {
            tryMurderKill();
        } else if (player.role === 'sheriff' && player.shootingCooldown <= 0) {
            trySheriffShoot();
        }
    }
});
window.addEventListener('mouseup', () => mouse.clicked = false);

function tryMurderKill() {
    const worldMouseX = mouse.x - canvas.width / 2 + camera.x;
    const worldMouseY = mouse.y - canvas.height / 2 + camera.y;

    // Check if mouse is near any alive player (not self)
    const allPlayers = [player, ...bots];
    for (let p of allPlayers) {
        if (p === player || !p.alive) continue;
        const dist = Math.hypot(p.x - worldMouseX, p.y - worldMouseY);
        if (dist < 60) {
            const distToPlayer = Math.hypot(p.x - player.x, p.y - player.y);
            if (distToPlayer < 80) {
                killPlayer(p);
                player.killCooldown = 60;
                spawnParticles(p.x, p.y, '#ff0044', 15);
                return;
            }
        }
    }
    // Also check bots near player
    for (let p of allPlayers) {
        if (p === player || !p.alive) continue;
        const distToPlayer = Math.hypot(p.x - player.x, p.y - player.y);
        if (distToPlayer < 50) {
            killPlayer(p);
            player.killCooldown = 60;
            spawnParticles(p.x, p.y, '#ff0044', 15);
            return;
        }
    }
}

function trySheriffShoot() {
    const worldMouseX = mouse.x - canvas.width / 2 + camera.x;
    const worldMouseY = mouse.y - canvas.height / 2 + camera.y;

    const allPlayers = [player, ...bots];
    let hit = false;
    for (let p of allPlayers) {
        if (p === player || !p.alive) continue;
        const dist = Math.hypot(p.x - worldMouseX, p.y - worldMouseY);
        if (dist < 60) {
            const distToPlayer = Math.hypot(p.x - player.x, p.y - player.y);
            if (distToPlayer < 200) {
                hit = true;
                if (p.role === 'murder') {
                    killPlayer(p);
                    spawnParticles(p.x, p.y, '#44aaff', 20);
                    endRound('sheriff_win', 'Вы нашли убийцу! 🎉');
                } else {
                    // Shot innocent - sheriff dies
                    killPlayer(player);
                    spawnParticles(player.x, player.y, '#ff0044', 15);
                    endRound('murder_win', 'Вы убили невиновного! Убийца победил 💀');
                }
                player.shootingCooldown = 90;
                break;
            }
        }
    }
    if (!hit) {
        player.shootingCooldown = 40;
        // Bullet miss particle
        spawnParticles(worldMouseX, worldMouseY, '#ffcc00', 5);
    }
}

function killPlayer(p) {
    p.alive = false;
    // Death particles
    for (let i = 0; i < 10; i++) {
        particles.push({
            x: p.x, y: p.y,
            vx: (Math.random() - 0.5) * 6,
            vy: (Math.random() - 0.5) * 6,
            life: 30 + Math.random() * 20,
            maxLife: 50,
            color: p.color,
            size: 3 + Math.random() * 4,
        });
    }
}

function spawnParticles(x, y, color, count) {
    for (let i = 0; i < count; i++) {
        particles.push({
            x, y,
            vx: (Math.random() - 0.5) * 8,
            vy: (Math.random() - 0.5) * 8,
            life: 20 + Math.random() * 30,
            maxLife: 50,
            color,
            size: 2 + Math.random() * 5,
        });
    }
}

function endRound(result, text) {
    gameState = 'ended';
    const el = document.getElementById('round-result');
    el.style.display = 'block';
    document.getElementById('result-title').textContent = result.includes('win') ? '🏆 ПОБЕДА!' : '💀 ПРОИГРЫШ';
    document.getElementById('result-title').style.color = result.includes('win') ? '#44ff88' : '#ff4444';
    document.getElementById('result-text').textContent = text;
    el.style.borderColor = result.includes('win') ? '#44ff88' : '#ff4444';
    document.getElementById('instructions').style.display = 'none';
    document.getElementById('kill-cooldown').style.display = 'none';
    document.getElementById('role-display').style.display = 'none';
    document.getElementById('alive-count').style.display = 'none';
}

function backToLobby() {
    document.getElementById('round-result').style.display = 'none';
    initLobby();
}

// ============ COLLISION ============
function collidesWithWall(x, y, size, map) {
    for (let w of map.walls) {
        if (x + size > w.x && x - size < w.x + w.w &&
            y + size > w.y && y - size < w.y + w.h) {
            return true;
        }
    }
    return false;
}

// ============ BOT AI ============
function updateBots(map) {
    bots.forEach(bot => {
        if (!bot.alive) return;
        bot.moveTimer--;
        if (bot.moveTimer <= 0) {
            bot.targetX = 100 + Math.random() * (map.width ? map.width - 200 : 700);
            bot.targetY = 100 + Math.random() * (map.height ? map.height - 200 : 500);
            bot.moveTimer = 120 + Math.random() * 180;
        }

        // Murder bot AI
        if (bot.role === 'murder' && bot.killCooldown <= 0) {
            // Find nearest player
            let nearest = null;
            let nearestDist = Infinity;
            const allPlayers = [player, ...bots];
            for (let p of allPlayers) {
                if (p === bot || !p.alive) continue;
                const d = Math.hypot(p.x - bot.x, p.y - bot.y);
                if (d < nearestDist) { nearestDist = d; nearest = p; }
            }
            if (nearest && nearestDist < 50) {
                killPlayer(nearest);
                bot.killCooldown = 90;
                spawnParticles(nearest.x, nearest.y, '#ff0044', 15);
                return;
            }
            if (nearest && nearestDist < 300) {
                // Chase
                const dx = nearest.x - bot.x;
                const dy = nearest.y - bot.y;
                const dist = Math.hypot(dx, dy);
                const nx = dx / dist * bot.speed;
                const ny = dy / dist * bot.speed;
                if (!collidesWithWall(bot.x + nx, bot.y, bot.size, map)) bot.x += nx;
                if (!collidesWithWall(bot.x, bot.y + ny, bot.size, map)) bot.y += ny;
                return;
            }
        }

        // Sheriff bot AI
        if (bot.role === 'sheriff' && bot.shootingCooldown <= 0) {
            // Check if murder is nearby
            let murderNear = null;
            let murderDist = Infinity;
            const allPlayers = [player, ...bots];
            for (let p of allPlayers) {
                if (p === bot || !p.alive || p.role !== 'murder') continue;
                const d = Math.hypot(p.x - bot.x, p.y - bot.y);
                if (d < murderDist) { murderDist = d; murderNear = p; }
            }
            if (murderNear && murderDist < 200) {
                // 30% chance to shoot correctly
                if (Math.random() < 0.3) {
                    killPlayer(murderNear);
                    spawnParticles(murderNear.x, murderNear.y, '#44aaff', 20);
                    // Check if player is the murderer
                    if (murderNear === player) {
                        endRound('sheriff_win', 'Шериф нашёл убийцу! 💀');
                    }
                    bot.shootingCooldown = 90;
                    return;
                }
            }
        }

        // Move towards target
        const dx = bot.targetX - bot.x;
        const dy = bot.targetY - bot.y;
        const dist = Math.hypot(dx, dy);
        if (dist > 10) {
            const nx = (dx / dist) * bot.speed;
            const ny = (dy / dist) * bot.speed;
            if (!collidesWithWall(bot.x + nx, bot.y, bot.size, map)) bot.x += nx;
            if (!collidesWithWall(bot.x, bot.y + ny, bot.size, map)) bot.y += ny;
        }

        if (bot.killCooldown > 0) bot.killCooldown--;
        if (bot.shootingCooldown > 0) bot.shootingCooldown--;
    });
}

// ============ UPDATE ============
function update() {
    if (gameState === 'countdown') {
        countdownTimer -= 1 / 60;
        if (countdownTimer <= 0) {
            gameState = 'playing';
        }
        return;
    }

    if (gameState !== 'playing') return;

    // Player movement
    let dx = 0, dy = 0;
    if (keys['w'] || keys['ц'] || keys['arrowup']) dy = -1;
    if (keys['s'] || keys['ы'] || keys['arrowdown']) dy = 1;
    if (keys['a'] || keys['ф'] || keys['arrowleft']) dx = -1;
    if (keys['d'] || keys['в'] || keys['arrowright']) dx = 1;

    if (dx !== 0 && dy !== 0) {
        dx *= 0.707;
        dy *= 0.707;
    }

    const currentMap = gameState === 'lobby' ? LOBBY_MAP : GAME_MAP;

    if (player.alive) {
        const newX = player.x + dx * player.speed;
        const newY = player.y + dy * player.speed;
        if (!collidesWithWall(newX, player.y, player.size, currentMap)) player.x = newX;
        if (!collidesWithWall(player.x, newY, player.size, currentMap)) player.y = newY;

        if (player.killCooldown > 0) player.killCooldown--;
        if (player.shootingCooldown > 0) player.shootingCooldown--;
    }

    // Camera
    camera.x += (player.x - camera.x) * 0.1;
    camera.y += (player.y - camera.y) * 0.1;

    // Bots
    updateBots(currentMap);

    // Particles
    particles = particles.filter(p => {
        p.x += p.vx;
        p.y += p.vy;
        p.vx *= 0.95;
        p.vy *= 0.95;
        p.life--;
        return p.life > 0;
    });

    // Check win conditions
    if (gameState === 'playing') {
        const allPlayers = [player, ...bots];
        const alive = allPlayers.filter(p => p.alive);
        const murderAlive = alive.filter(p => p.role === 'murder');
        const sheriffAlive = alive.filter(p => p.role === 'sheriff');
        const innocentsAlive = alive.filter(p => p.role === 'innocent');

        if (murderAlive.length === 0) {
            if (player.role === 'murder') {
                endRound('sheriff_win', 'Убийца eliminated! Шериф победил! 🎉');
            } else {
                endRound('innocent_win', 'Убийца eliminated! Невинные победили! 🎉');
            }
        } else if (player.role === 'murder' && (innocentsAlive.length === 0 && sheriffAlive.length === 0)) {
            endRound('murder_win', 'Вы убили всех! Победа убийцы! 🗡️');
        } else if (player.role !== 'murder' && !player.alive) {
            if (murderAlive.length > 0) {
                endRound('murder_win', 'Вас убил убийца! 💀');
            }
        } else if (bots.length > 0 && alive.length <= murderAlive.length) {
            // Only murder(s) alive
            endRound('murder_win', 'Убийца победил! 💀');
        }

        roundTimer++;
    }

    // Update HUD
    if (gameState === 'playing') {
        const allPlayers = [player, ...bots];
        const aliveCount = allPlayers.filter(p => p.alive).length;
        const totalCount = allPlayers.length;
        document.getElementById('alive-count').innerHTML = `👥 Живых: ${aliveCount}/${totalCount}`;

        if (player.role === 'murder') {
            const cd = Math.ceil(player.killCooldown / 60 * 10) / 10;
            document.getElementById('kill-cooldown').innerHTML = `🗡️ Кулдаун: ${Math.max(0, cd).toFixed(1)}с`;
        } else if (player.role === 'sheriff') {
            const cd = Math.ceil(player.shootingCooldown / 60 * 10) / 10;
            document.getElementById('kill-cooldown').innerHTML = `🔫 Кулдаун: ${Math.max(0, cd).toFixed(1)}с`;
        }
    }
}

// ============ DRAW ============
function getSkinColor() {
    const skin = SKINS.find(s => s.id === selectedSkin);
    return skin ? skin.color : '#cccccc';
}

function drawKnife(x, y, skinId, angle) {
    const skin = SKINS.find(s => s.id === skinId);
    const color = skin ? skin.color : '#cccccc';

    ctx.save();
    ctx.translate(x, y);
    ctx.rotate(angle);

    // Blade
    ctx.fillStyle = color;
    ctx.beginPath();
    ctx.moveTo(0, -12);
    ctx.lineTo(4, -2);
    ctx.lineTo(4, 2);
    ctx.lineTo(0, 4);
    ctx.lineTo(-4, 2);
    ctx.lineTo(-4, -2);
    ctx.closePath();
    ctx.fill();

    // Handle
    ctx.fillStyle = '#8B4513';
    ctx.fillRect(-3, 4, 6, 8);

    // Guard
    ctx.fillStyle = '#666';
    ctx.fillRect(-5, 3, 10, 2);

    // Glow effect for special skins
    if (skinId === 'flame') {
        ctx.globalAlpha = 0.4;
        ctx.fillStyle = '#ff6600';
        ctx.beginPath();
        ctx.arc(0, -8, 8, 0, Math.PI * 2);
        ctx.fill();
    } else if (skinId === 'ice') {
        ctx.globalAlpha = 0.3;
        ctx.fillStyle = '#88ddff';
        ctx.beginPath();
        ctx.arc(0, -8, 10, 0, Math.PI * 2);
        ctx.fill();
    } else if (skinId === 'galaxy') {
        ctx.globalAlpha = 0.3;
        const gradient = ctx.createRadialGradient(0, -8, 0, 0, -8, 12);
        gradient.addColorStop(0, '#ff44ff');
        gradient.addColorStop(1, '#4444ff');
        ctx.fillStyle = gradient;
        ctx.beginPath();
        ctx.arc(0, -8, 12, 0, Math.PI * 2);
        ctx.fill();
    } else if (skinId === 'gold') {
        ctx.globalAlpha = 0.3;
        ctx.fillStyle = '#ffdd44';
        ctx.beginPath();
        ctx.arc(0, -8, 8, 0, Math.PI * 2);
        ctx.fill();
    } else if (skinId === 'rainbow') {
        ctx.globalAlpha = 0.5;
        const hue = (Date.now() / 20) % 360;
        ctx.fillStyle = `hsl(${hue}, 100%, 50%)`;
        ctx.beginPath();
        ctx.arc(0, -8, 8, 0, Math.PI * 2);
        ctx.fill();
    } else if (skinId === 'shadow') {
        ctx.globalAlpha = 0.5;
        ctx.fillStyle = '#000';
        ctx.beginPath();
        ctx.arc(0, -8, 10, 0, Math.PI * 2);
        ctx.fill();
    } else if (skinId === 'blood') {
        ctx.globalAlpha = 0.4;
        ctx.fillStyle = '#ff0000';
        ctx.beginPath();
        ctx.arc(0, -8, 10, 0, Math.PI * 2);
        ctx.fill();
    }

    ctx.restore();
}

function drawCharacter(x, y, size, color, name, role, alive, isPlayer, skinId, map) {
    const screenX = x - camera.x + canvas.width / 2;
    const screenY = y - camera.y + canvas.height / 2;

    // Off-screen check
    if (screenX < -50 || screenX > canvas.width + 50 || screenY < -50 || screenY > canvas.height + 50) return;

    if (!alive) {
        // Dead marker
        ctx.globalAlpha = 0.5;
        ctx.fillStyle = '#ff0000';
        ctx.font = '20px Arial';
        ctx.textAlign = 'center';
        ctx.fillText('💀', screenX, screenY + 5);
        ctx.globalAlpha = 1;
        ctx.fillStyle = '#aaa';
        ctx.font = '11px Arial';
        ctx.fillText(name, screenX, screenY + 22);
        return;
    }

    // Shadow
    ctx.fillStyle = 'rgba(0,0,0,0.3)';
    ctx.beginPath();
    ctx.ellipse(screenX, screenY + size, size * 0.8, size * 0.3, 0, 0, Math.PI * 2);
    ctx.fill();

    // Body
    ctx.fillStyle = color;
    ctx.beginPath();
    ctx.arc(screenX, screenY, size, 0, Math.PI * 2);
    ctx.fill();

    // Outline
    ctx.strokeStyle = isPlayer ? '#fff' : 'rgba(255,255,255,0.3)';
    ctx.lineWidth = isPlayer ? 3 : 1;
    ctx.stroke();

    // Role indicator
    if (role === 'murder' && (isPlayer || gameState === 'ended')) {
        ctx.fillStyle = '#ff0044';
        ctx.font = '10px Arial';
        ctx.textAlign = 'center';
        ctx.fillText('🗡️', screenX, screenY - size - 8);
    }

    // Name
    ctx.fillStyle = '#fff';
    ctx.font = 'bold 12px Arial';
    ctx.textAlign = 'center';
    ctx.fillText(name, screenX, screenY - size - 14);

    // Knife for murder
    if (role === 'murder' && (isPlayer || gameState === 'ended')) {
        const time = Date.now() / 1000;
        const knifeAngle = Math.sin(time * 3) * 0.3;
        drawKnife(screenX + 14, screenY - 5, skinId || 'classic', knifeAngle);
    }

    // Sheriff gun indicator
    if (role === 'sheriff' && (isPlayer || gameState === 'ended')) {
        ctx.fillStyle = '#44aaff';
        ctx.font = '10px Arial';
        ctx.textAlign = 'center';
        ctx.fillText('🔫', screenX, screenY - size - 8);
    }
}

function drawMap(map) {
    const offsetX = -camera.x + canvas.width / 2;
    const offsetY = -camera.y + canvas.height / 2;

    // Floor
    ctx.fillStyle = map.floorColor;
    if (map.name) {
        ctx.fillRect(offsetX, offsetY, map.width, map.height);
    } else {
        ctx.fillRect(offsetX, offsetY, 1000, 700);
    }

    // Floor grid
    ctx.strokeStyle = 'rgba(255,255,255,0.03)';
    ctx.lineWidth = 1;
    const gridSize = 50;
    const startX = Math.floor((-offsetX) / gridSize) * gridSize;
    const startY = Math.floor((-offsetY) / gridSize) * gridSize;
    for (let x = startX; x < startX + canvas.width + gridSize * 2; x += gridSize) {
        ctx.beginPath();
        ctx.moveTo(x + offsetX, offsetY);
        ctx.lineTo(x + offsetX, offsetY + canvas.height + gridSize * 2);
        ctx.stroke();
    }
    for (let y = startY; y < startY + canvas.height + gridSize * 2; y += gridSize) {
        ctx.beginPath();
        ctx.moveTo(offsetX, y + offsetY);
        ctx.lineTo(offsetX + canvas.width + gridSize * 2, y + offsetY);
        ctx.stroke();
    }

    // Decorations
    if (map.decorations) {
        map.decorations.forEach(dec => {
            const dx = dec.x + offsetX;
            const dy = dec.y + offsetY;
            if (dec.type === 'carpet') {
                ctx.fillStyle = dec.color;
                ctx.fillRect(dx, dy, dec.w, dec.h);
            } else if (dec.type === 'plant') {
                ctx.fillStyle = '#2d5a1e';
                ctx.beginPath();
                ctx.arc(dx, dy, 12, 0, Math.PI * 2);
                ctx.fill();
                ctx.fillStyle = '#3a7a28';
                ctx.beginPath();
                ctx.arc(dx, dy - 5, 8, 0, Math.PI * 2);
                ctx.fill();
            } else if (dec.type === 'lamp') {
                ctx.fillStyle = '#ffdd88';
                ctx.globalAlpha = 0.3 + Math.sin(Date.now() / 500) * 0.1;
                ctx.beginPath();
                ctx.arc(dx, dy, 20, 0, Math.PI * 2);
                ctx.fill();
                ctx.globalAlpha = 1;
                ctx.fillStyle = '#ffcc44';
                ctx.beginPath();
                ctx.arc(dx, dy, 5, 0, Math.PI * 2);
                ctx.fill();
            } else if (dec.type === 'sign') {
                ctx.fillStyle = 'rgba(0,0,0,0.6)';
                ctx.fillRect(dx - 30, dy - 8, 60, 20);
                ctx.fillStyle = '#e94560';
                ctx.font = 'bold 14px Arial';
                ctx.textAlign = 'center';
                ctx.fillText(dec.text, dx + 10, dy + 7);
            }
        });
    }

    // Room labels for game map
    if (map.rooms) {
        map.rooms.forEach(room => {
            const rx = room.x + offsetX;
            const ry = room.y + offsetY;
            // Check if on screen
            if (rx + room.w > 0 && rx < canvas.width && ry + room.h > 0 && ry < canvas.height) {
                ctx.fillStyle = 'rgba(255,255,255,0.06)';
                ctx.fillRect(rx, ry, room.w, room.h);
                ctx.fillStyle = 'rgba(255,255,255,0.15)';
                ctx.font = '11px Arial';
                ctx.textAlign = 'center';
                ctx.fillText(room.name, rx + room.w / 2, ry + 16);
            }
        });
    }

    // Walls
    map.walls.forEach(w => {
        const wx = w.x + offsetX;
        const wy = w.y + offsetY;
        // Check if on screen
        if (wx + w.w > -10 && wx < canvas.width + 10 && wy + w.h > -10 && wy < canvas.height + 10) {
            // Wall shadow
            ctx.fillStyle = 'rgba(0,0,0,0.3)';
            ctx.fillRect(wx + 3, wy + 3, w.w, w.h);

            // Wall
            ctx.fillStyle = map.wallColor;
            ctx.fillRect(wx, wy, w.w, w.h);

            // Wall highlight
            ctx.fillStyle = 'rgba(255,255,255,0.1)';
            ctx.fillRect(wx, wy, w.w, 2);
            ctx.fillRect(wx, wy, 2, w.h);
        }
    });
}

function drawParticles() {
    particles.forEach(p => {
        const sx = p.x - camera.x + canvas.width / 2;
        const sy = p.y - camera.y + canvas.height / 2;
        ctx.globalAlpha = p.life / p.maxLife;
        ctx.fillStyle = p.color;
        ctx.beginPath();
        ctx.arc(sx, sy, p.size * (p.life / p.maxLife), 0, Math.PI * 2);
        ctx.fill();
    });
    ctx.globalAlpha = 1;
}

function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    if (gameState === 'lobby') {
        drawMap(LOBBY_MAP);
        bots.forEach(b => drawCharacter(b.x, b.y, b.size, b.color, b.name, b.role, b.alive, false, 'classic', LOBBY_MAP));
        drawCharacter(player.x, player.y, player.size, '#44ff88', 'You', player.role, player.alive, true, selectedSkin, LOBBY_MAP);
        drawParticles();
    } else if (gameState === 'countdown') {
        drawMap(GAME_MAP);
        bots.forEach(b => drawCharacter(b.x, b.y, b.size, b.color, b.name, b.role, b.alive, false, 'classic', GAME_MAP));
        drawCharacter(player.x, player.y, player.size, '#44ff88', 'You', player.role, player.alive, true, selectedSkin, GAME_MAP);
        drawParticles();

        // Countdown text
        ctx.fillStyle = 'rgba(0,0,0,0.5)';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = '#fff';
        ctx.font = 'bold 80px Arial';
        ctx.textAlign = 'center';
        const count = Math.ceil(countdownTimer);
        ctx.fillText(count > 0 ? count : 'GO!', canvas.width / 2, canvas.height / 2);
    } else if (gameState === 'playing' || gameState === 'ended') {
        drawMap(GAME_MAP);
        bots.forEach(b => drawCharacter(b.x, b.y, b.size, b.color, b.name, b.role, b.alive, false, 'classic', GAME_MAP));
        drawCharacter(player.x, player.y, player.size, '#44ff88', 'You', player.role, player.alive, true, selectedSkin, GAME_MAP);
        drawParticles();

        // Fog of war - darken areas far from player
        if (gameState === 'playing' && player.alive) {
            const gradient = ctx.createRadialGradient(
                canvas.width / 2, canvas.height / 2, 150,
                canvas.width / 2, canvas.height / 2, 500
            );
            gradient.addColorStop(0, 'rgba(0,0,0,0)');
            gradient.addColorStop(1, 'rgba(0,0,0,0.4)');
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, canvas.width, canvas.height);
        }
    }

    // Murder knife on screen for player
    if (gameState === 'playing' && player.alive && player.role === 'murder') {
        const time = Date.now() / 1000;
        const knifeX = canvas.width - 80;
        const knifeY = canvas.height - 80;
        drawKnife(knifeX, knifeY, selectedSkin, Math.sin(time * 2) * 0.2);
    }
}

// ============ GAME LOOP ============
function gameLoop() {
    update();
    draw();
    requestAnimationFrame(gameLoop);
}

// ============ START ============
initLobby();
gameLoop();
</script>
